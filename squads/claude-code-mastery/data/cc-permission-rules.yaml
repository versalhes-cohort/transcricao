# ═══════════════════════════════════════════════════════════
# DANGEROUS DIRECTORIES (BR-PERM-002) — always prompt
# ═══════════════════════════════════════════════════════════

dangerous_directories:
  source: "filesystem.ts:74-79"
  rule_id: BR-PERM-002
