# Claude Code Quick Reference Card
# Squad: claude-code-mastery
# Last updated: 2026-04-03

version: "1.1.0"
claude_code_version: "1.0.x"

# ---------------------------------------------------------------------------
# INTERNAL TOOLS (16+)
# ---------------------------------------------------------------------------
tools:
  file_operations:
    - name: Read
      description: "Read file contents with optional line range"
      supports: "text, images, PDFs (page ranges), Jupyter notebooks"
    - name: Write
      description: "Create new files or complete rewrites"
      note: "Must Read file first if it exists"
    - name: Edit
      description: "Exact string replacement in existing files"
      note: "old_string must be unique; use replace_all for bulk"
    - name: MultiEdit
      description: "Multiple edits in a single file atomically"

  search:
    - name: Glob
      description: "Fast file pattern matching (e.g., **/*.ts)"
      returns: "File paths sorted by modification time"
    - name: Grep
      description: "Content search using ripgrep regex"
      modes: [content, files_with_matches, count]

  execution:
    - name: Bash
      description: "Execute shell commands with timeout control"
      max_timeout_ms: 600000
      supports: "background execution via run_in_background"
    - name: Agent
      description: "Spawn subagent for complex multi-step tasks"
      types: [Explore, Plan, general-purpose, custom]

  web:
    - name: WebSearch
      description: "Search the web for current information"
    - name: WebFetch
      description: "Fetch content from a specific URL"

  context:
    - name: TodoRead
      description: "Read current todo/task list"
    - name: TodoWrite
      description: "Update todo/task list items"
    - name: TaskOutput
      description: "Read output from background tasks"

  mcp_tools:
    description: "Tools from connected MCP servers (mcp__server__tool)"
    pattern: "mcp__{server_name}__{tool_name}"

# ---------------------------------------------------------------------------
# PERMISSION MODES
# ---------------------------------------------------------------------------
permission_modes:
  - name: default
    description: "Prompt when an operation is not already allowed by rules or safe-path fast paths"
    badge: "[Default]"
    use_case: "Strict or team-shared baseline with deny-first rules"
    note: "`askAlways` is legacy terminology; use `default`"

  - name: acceptEdits
    description: "Auto-accept eligible file edits in working directory; Bash, MCP, and other tools still follow rules/prompts"
    badge: "[Accept]"
    use_case: "Balanced daily development setup"

  - name: dontAsk
    description: "Converts promptable operations into deny instead of asking the user"
    badge: "[DontAsk]"
    use_case: "Headless or fail-closed environments with explicit allowlists"

  - name: bypassPermissions
    description: "Bypasses permission prompts, but safety checks still fire"
    badge: "[Bypass]"
    use_case: "Isolated sandbox or no-internet container only"
    cli_gate: "--dangerously-skip-permissions or --allow-dangerously-skip-permissions"

  - name: plan
    description: "Read-only planning and exploration mode"
    badge: "[Plan]"
    use_case: "Architecture review and approval-first flows"

  - name: auto
    description: "Feature-gated classifier mode; not universally available"
    badge: "[Auto]"
    use_case: "Conditional/internal workflows only"
    availability: "Only when transcript-classifier/auto-mode features are enabled"

permission_pipeline:
  order: [safety, headless, bypass, denylist, allowlist, classifier, prompt]
  dontAsk_transform: "After evaluation, any remaining ask becomes deny"
  legacy_mapping:
    askAlways: "Replace with default"
    autoApprove: "Do not auto-migrate; choose dontAsk (fail-closed) or bypassPermissions (gated fail-open)"

# ---------------------------------------------------------------------------
# HOOK EVENTS (17)
# ---------------------------------------------------------------------------
hook_events:
  tool_lifecycle:
    - event: PreToolUse
      description: "Before any tool execution"
      use_cases: [damage-control, security-gate, logging]
      matcher_fields: [tool_name, tool_input]

    - event: PostToolUse
      description: "After tool execution completes"
      use_cases: [auto-lint, metrics, notification]
      matcher_fields: [tool_name, tool_input, tool_output]

  session_lifecycle:
    - event: Stop
      description: "When the agent turn ends"
      use_cases: [cost-tracking, summary-generation, cleanup]

    - event: SubagentStart
      description: "When a subagent is spawned"
      use_cases: [logging, resource-tracking]

    - event: SubagentStop
      description: "When a subagent completes"
      use_cases: [result-aggregation, cleanup]

  context_management:
    - event: PreCompact
      description: "Before context window compaction"
      use_cases: [state-preservation, important-context-save]

    - event: UserPromptSubmit
      description: "When user submits a prompt"
      use_cases: [input-validation, routing, logging]

    - event: Notification
      description: "When a notification is triggered"
      use_cases: [slack-integration, email-alerts, desktop-notify]

  advanced_events:
    - event: PreToolUse (Bash)
      description: "Matcher for Bash tool specifically"
      example_matcher: "tool_name == 'Bash'"

    - event: PreToolUse (Write)
      description: "Matcher for Write tool specifically"
      example_matcher: "tool_name == 'Write'"

    - event: PostToolUse (Edit)
      description: "After Edit tool completes"
      example_matcher: "tool_name == 'Edit'"

  hook_config_format:
    location: "~/.claude/settings.json or .claude/settings.json"
    structure: |
      {
        "hooks": {
          "PreToolUse": [{ "matcher": "...", "hooks": [{ "type": "command", "command": "..." }] }],
          "PostToolUse": [{ "matcher": "", "hooks": [{ "type": "command", "command": "..." }] }],
          "Stop": [{ "matcher": "", "hooks": [{ "type": "command", "command": "..." }] }]
        }
      }

# ---------------------------------------------------------------------------
# SUBAGENT TYPES
# ---------------------------------------------------------------------------
subagent_types:
  builtin:
    - name: Explore
      description: "Read-only exploration subagent"
      permissions: "Can read files, search, but cannot write"
      use_case: "Safe codebase exploration and analysis"

    - name: Plan
      description: "Planning subagent that creates execution plans"
      permissions: "Read-only, outputs structured plan"
      use_case: "Architecture decisions, implementation planning"

  custom:
    - name: general-purpose
      description: "Full-capability subagent"
      permissions: "Inherits parent permissions"
      use_case: "Delegated implementation tasks"

    - name: custom-agents
      location: ".claude/agents/*.md"
      description: "User-defined agent personas with custom instructions"
      activation: "claude --agent agents/my-agent.md"

# ---------------------------------------------------------------------------
# SETTINGS HIERARCHY (highest to lowest priority)
# ---------------------------------------------------------------------------
settings_hierarchy:
  - level: 1
    name: "Managed Policy"
    file: "managed-settings.json / managed-mcp.json"
    description: "Enterprise/org-level policy surfaces, cannot be overridden"
    scope: global

  - level: 2
    name: "CLI Flags"
    description: "Runtime flags (--permission-mode, --allowed-tools, --dangerously-skip-permissions)"
    scope: session

  - level: 3
    name: "Project Local"
    file: ".claude/settings.local.json"
    description: "Per-project settings, gitignored"
    scope: project

  - level: 4
    name: "Project Shared"
    file: ".claude/settings.json"
    description: "Shared project settings, committed to git"
    scope: project

  - level: 5
    name: "User Global"
    file: "~/.claude/settings.json"
    description: "User-level defaults across all projects"
    scope: global

# ---------------------------------------------------------------------------
# MCP TRANSPORTS
# ---------------------------------------------------------------------------
mcp_transports:
  - name: stdio
    description: "Standard I/O communication (most common)"
    config_key: "command"
    example: '{"command": "npx", "args": ["-y", "@modelcontextprotocol/server-filesystem"]}'
    use_case: "Local MCP servers, npm packages"

  - name: http_streamable
    description: "HTTP Streamable transport (newer, recommended for remote)"
    config_key: "url"
    example: '{"url": "https://mcp.example.com"}'
    use_case: "Remote MCP servers, cloud services"

  - name: sse
    description: "Server-Sent Events (legacy, being replaced by HTTP Streamable)"
    config_key: "url"
    example: '{"url": "http://localhost:3001/sse"}'
    use_case: "Legacy remote MCP servers"

mcp_policy:
  project_file: ".mcp.json"
  enterprise_file: "managed-mcp.json"
  merge_behavior: "Manual/project configuration wins over plugin duplicates; between plugins, first-loaded wins"
  enterprise_control: "If enterprise MCP config exists, it has exclusive control and local add operations are rejected"
  write_behavior: ".mcp.json is written via temp file + fsync + atomic rename"

# ---------------------------------------------------------------------------
# MEMORY SYSTEM
# ---------------------------------------------------------------------------
memory_system:
  entrypoint:
    file: "MEMORY.md"
    role: "Distilled memory index loaded into context"
    caps:
      max_lines: 200
      max_bytes: 25000
  project_instructions:
    - file: "CLAUDE.md"
      location: "project root"
      description: "Primary project instructions, always loaded"
      priority: highest

    - file: ".claude/CLAUDE.md"
      location: ".claude directory"
      description: "Additional project instructions"
      priority: high

    - file: "~/.claude/CLAUDE.md"
      location: "user home"
      description: "Global user instructions across all projects"
      priority: medium

  rules:
    location: ".claude/rules/*.md"
    description: "Contextual rules loaded based on file path patterns"
    frontmatter_key: "paths"
    example: "paths: ['src/**/*.ts'] loads only when editing TypeScript files"

  typed_memory:
    taxonomy: [user, feedback, project, reference]
    exclusion_rule: "Do not store content derivable from current project state such as code patterns, architecture, or git history"

  retrieval:
    additional_memories: "Select up to 5 clearly useful memories"
    skip_entrypoint: "MEMORY.md is already loaded and should not be re-selected"
    recent_tool_rule: "Do not reselect plain usage docs for tools already in active use; still surface warnings and known gotchas"

  assistant_mode:
    availability: "Feature-gated KAIROS assistant sessions"
    write_behavior: "Append short timestamped bullets to date-based daily log files"
    distillation: "Nightly process distills logs into topic files and MEMORY.md"

# ---------------------------------------------------------------------------
# SKILL SYSTEM
# ---------------------------------------------------------------------------
skills:
  discovery_surfaces:
    managed: "<managed>/.claude/skills/<skill>/SKILL.md"
    user: "~/.claude/skills/<skill>/SKILL.md"
    project: ".claude/skills/<skill>/SKILL.md"
    plugin: "<plugin>/skills/<skill>/SKILL.md"
    additional_dirs: "--add-dir <path> loads <path>/.claude/skills/"
    legacy_commands: "Legacy slash-command surface retired. Use .claude/skills/{name}/SKILL.md only."
    bundled: "Built-in skills ship with Claude Code"
    mcp: "skill:// resources from MCP servers are feature-gated and remote/untrusted"
  loading_model:
    routing_basis: "Routing uses metadata first: description, when_to_use, invocability flags, and optional paths"
    body_loading: "Full SKILL.md body loads on invocation, not during every discovery pass"
    supporting_files: "references/, scripts/, and assets/ are read only when needed"
    compaction: "Invoked skills survive compaction in truncated form with the top of the skill treated as most critical"
    hot_reload: "Local skill and command directories are watched; changes invalidate memoized command caches"
  activation:
    unconditional: "Skills without paths are immediately available after discovery"
    conditional: "Skills with paths stay dormant until cwd-relative files match their globs"
    deduplication: "File-based skills deduplicate by resolved realpath"
    bare_mode: "--bare skips managed/user/project autodiscovery and legacy commands, but still honors explicit --add-dir skill roots"
    disable_all: "--disable-slash-commands disables slash-command skill surfaces"
  frontmatter:
    # Full schema: squads/claude-code-mastery/data/frontmatter-schemas.yaml
    native_fields:
      - name
      - description
      - allowed-tools
      - argument-hint
      - arguments
      - when_to_use
      - version
      - model
      - disable-model-invocation
      - user-invocable
      - hooks
      - context
      - agent
      - effort
      - shell
      - paths
      - maxTurns
    context_modes:
      inline:
        value: "omit field (default)"
        behavior: "Skill content expands into the current conversation"
        token_budget: "Shared with parent"
        conversation_history: true
        permissions: "Parent's permissions"
        transcript: "Single conversation"
        use_when: "Personas, guides, references, conventions that inform ongoing work"
      fork:
        value: "fork"
        behavior: "Skill runs in an isolated sub-agent with separate context"
        token_budget: "Separate (own context window)"
        conversation_history: false
        permissions: "Filtered by allowed-tools field"
        transcript: "Separate sidechain"
        agent_field: "Specifies subagent type (default: general-purpose). Options: Explore, Plan, general-purpose, or any custom agent"
        use_when: "Self-contained tasks: research, deploy, audit, PR summary"
      source_refs:
        type_definition: "src/types/command.ts:42-48 — context?: 'inline' | 'fork'"
        parsing: "src/skills/loadSkillsDir.ts:260 — frontmatter.context === 'fork' ? 'fork' : undefined"
        decision: "src/tools/SkillTool/SkillTool.ts:621-632 — if command.context === 'fork' then executeForkedSkill()"
        fork_execution: "src/utils/forkedAgent.ts:191-232 — prepareForkedCommandContext()"
        agent_resolution: "src/utils/forkedAgent.ts:211-221 — command.agent ?? 'general-purpose'"
      hardening_note: |
        Any value other than 'fork' is treated as undefined (inline).
        Do NOT use 'conversation' or 'inline' as explicit values — just omit the field.
        Fork provides security isolation: separate token budget, restricted tools via allowed-tools,
        no access to conversation history. Use for skills that should not leak or consume parent context.
    shell_rule: "shell accepts bash or powershell for inline !-block preprocessing"
    mcp_safety: "Inline shell preprocessing is disabled for MCP-provided skills"
  substitutions:
    supported:
      - "$ARGUMENTS"
      - "$ARGUMENTS[N]"
      - "$N"
      - "${CLAUDE_SKILL_DIR}"
      - "${CLAUDE_SESSION_ID}"

# ---------------------------------------------------------------------------
# KEYBOARD SHORTCUTS
# ---------------------------------------------------------------------------
keyboard_shortcuts:
  built_in:
    - key: "Ctrl+C"
      action: "Cancel current operation / clear input"
    - key: "Escape"
      action: "Clear current input line"
    - key: "Tab"
      action: "Accept autocomplete suggestion"
    - key: "/"
      action: "Open slash command menu"
    - key: "#"
      action: "File reference autocomplete"
    - key: "@"
      action: "Agent/mention autocomplete"
  customization:
    file: "~/.claude/keybindings.json"
    availability: "Currently feature-gated/internal; external users may still fall back to default bindings"
    format: '{ "bindings": [ { "context": "Chat", "bindings": { "ctrl+j": "submit" } } ] }'
    valid_contexts: [Global, Chat, Autocomplete, Confirmation, Help]
    reserved_shortcuts: "Platform and terminal-reserved shortcuts are validated and may warn or error"

# ---------------------------------------------------------------------------
# CLI FLAGS (common)
# ---------------------------------------------------------------------------
cli_flags:
  - flag: "--model"
    description: "Override model (e.g., claude-sonnet-4-20250514)"
  - flag: "--agent"
    description: "Load custom agent from .md file"
  - flag: "--resume"
    description: "Resume a previous conversation"
  - flag: "--print / -p"
    description: "Headless mode, output to stdout (for CI/CD)"
  - flag: "--output-format"
    values: [text, json, stream-json]
    description: "Output format for headless mode"
  - flag: "--dangerously-skip-permissions"
    description: "Launch-time gate for bypassPermissions; recommended only for no-internet sandboxes"
  - flag: "--allowedTools"
    description: "Restrict which tools the agent can use"
  - flag: "--max-turns"
    description: "Limit agent turns in headless mode"
  - flag: "--add-dir"
    description: "Add additional directory to context"
  - flag: "--permission-mode"
    values: [default, acceptEdits, dontAsk, bypassPermissions, plan, auto]
    description: "Set permission mode for session (`auto` is feature-gated; `bypassPermissions` still requires dangerous-skip gate)"
