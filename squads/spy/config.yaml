# ═══════════════════════════════════════════════════════════════════════════════
# DEPENDENCIES & TAGS
# ═══════════════════════════════════════════════════════════════════════════════
dependencies:
  runtime:
    - aiox-core
  squads:
    - etl-ops
  services:
    - services/etl
  credentials:
    - name: YOUTUBE_API_KEY
      type: env_var
      required: false
    - name: META_ACCESS_TOKEN
      type: env_var
      required: false

