# Data Intelligence - Analytics Clone Squad v2.0
# Squad Configuration

pack:
  name: data
  title: "Data Intelligence - Analytics Clone Squad"
  version: "2.0.0"
  author: "AIOX Team"
  description: "Time de especialistas em analytics organizados por Tier para decisoes baseadas em dados"
  icon: "📊"
  slash_prefix: "data"

entry_agent: data-chief
tested: true

metadata:
  version: "2.0.0"
  score: 10.0

workspace_integration:
  level: none
  rationale: >-
    Data squad precisa consumir contexto real do workspace e só pode gravar
    artefatos canônicos quando existir template correspondente em
    workspace/_templates/analytics.
  read_paths:
    - workspace/businesses/
    - workspace/domains/brand/
    - workspace/domains/content/
    - workspace/domains/movement/
    - workspace/_templates/analytics/
    - workspace/_templates/business-template/L3-product/
    - workspace/_templates/business-template/
    - docs/data/
  write_paths:
    - workspace/_templates/analytics/
    - workspace/businesses/
    - docs/data/
  readiness_owner: "@coo"
  governance_handoff: "squads/c-level"
  template_namespace: analytics
  canonical_outputs_root: workspace/businesses/{slug}/analytics/
  custom_outputs_root: docs/data/{slug}/
  bootstrap:
    required: true
    script: "scripts/bootstrap-data-workspace.sh"
  essentials_validation:
    required: true
    script: "scripts/validate-data-essentials.sh"

# ═══════════════════════════════════════════════════════════════════════════════
# CHANGELOG
# ═══════════════════════════════════════════════════════════════════════════════
# v2.0.0 (2026-01-23)
# MAJOR UPGRADE - Framework de Clones Completo
#
# TIER SYSTEM:
# - Tier 0 (Fundamentacao): Fader (CLV/RFM), Ellis (Viral/Referral)
# - Tier 1 (Operacionalizacao): Mehta (Health/Churn), Spinks (Community), Kao (Learning)
# - Tier 2 (Comunicacao): Kaushik (Attribution/Reporting)
#
# CONTEXT:
# - SaaS, Comunidade, Educacao Online
# - Aquisicao via Indicacoes (Referral)
# - Desafio: Completion rate 3% → 96%
#
# REGRA DE OURO:
# Nunca implemente metrica sem passar por pelo menos 1 fundamentador (Tier 0)

# ═══════════════════════════════════════════════════════════════════════════════
# MMOS INTEGRATION
# ═══════════════════════════════════════════════════════════════════════════════
mmos_integration:
  enabled: false
  log_source: true
  fallback_behavior: "graceful"

  mind_mapping:
    # Tier 0 - Fundamentacao
    peter-fader: peter_fader
    sean-ellis: sean_ellis

    # Tier 1 - Operacionalizacao
    nick-mehta: nick_mehta
    david-spinks: david_spinks
    wes-kao: wes_kao

    # Tier 2 - Comunicacao
    avinash-kaushik: avinash_kaushik

