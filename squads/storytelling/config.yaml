# ═══════════════════════════════════════════════════════════════════════════════
# DEPENDENCIES
# ═══════════════════════════════════════════════════════════════════════════════
dependencies:
  required: []
  optional:
    - name: copy
      reason: "Integration with copywriting for sales narratives"
    - name: mmos
      reason: "Clone additional storytelling minds"

# ═══════════════════════════════════════════════════════════════════════════════
# METADATA
# ═══════════════════════════════════════════════════════════════════════════════
metadata:
  version: "1.0.0"
  score: 7.4
  category: content-creation
  complexity: intermediate
  created: "2026-01-29"
  last_updated: "2026-02-01"

settings:
  activation:
    show_context_report: true
    show_preload_report: true
    show_quick_commands: true
    quick_commands_limit: 6
  preload:
    max_shared_files: 3
    max_product_files: 4

workspace_integration:
  level: none
  rationale: >-
    Storytelling depende de contexto canônico de ICP, brand, positioning,
    offerbook, proof e pricing para criar narrativas de negócio consistentes,
    mas o output principal continua sendo narrativo e não define namespace
    próprio em workspace. O COO resolve readiness e o squad consome esse
    contrato antes de output final.
  read_paths:
    - workspace/_system/config.yaml
    - workspace/businesses/
    - workspace/_templates/product-narrative/
  write_paths: []
  readiness_owner: workspace-chief
  readiness_resolver: squads/storytelling/scripts/resolve-readiness.cjs

data:
  - id: story-mappings
    name: "Story Mappings — Canonical Vocabulary"
    format: yaml
    description: "Traduz pedidos narrativos vagos em terminologia profissional de storytelling."

# SINKRA v3.1 (Story 54.11)
bu_mapping: "hub-framework"
artifact_contracts:
  - artifact_id: "narrative-output"
    template_path: "templates/narrative-output-tmpl.md"
    lifecycle_states: [draft, validated, approved]
supported_modes:
  - CRIAR
  - ENTENDER
