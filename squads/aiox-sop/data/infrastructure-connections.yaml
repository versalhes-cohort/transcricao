  supabase:
    platform_status: existing
    project_url: ${SUPABASE_URL}
    tables:
    - table_name: sop_catalog
      task_ids:
      - T1.3
      - T1.2
      - T6.5
      - T6.6
      purpose: 'Registry central de todos os SOPs: ID, metadata, status, owner, storage
        path'
      status: new
      schema_minimal:
        id: uuid PRIMARY KEY DEFAULT gen_random_uuid()
        sop_id: text UNIQUE NOT NULL -- SOP-YYYYMMDD-NNN
        process_name: text NOT NULL
        owner_email: text NOT NULL
        storage_path: text NOT NULL
        file_type: text
        completeness_score: numeric(5,2)
        status: text DEFAULT 'intake' -- intake|extracting|grading|converting|publishing|done|rejected
        tier: text -- A|B|C|D
        rework_count: integer DEFAULT 0
        created_at: timestamptz DEFAULT now()
        updated_at: timestamptz DEFAULT now()
      rls_policy: Service role reads/writes. Authenticated users read own SOPs (owner_email
        = auth.email()).
      justification: Nenhuma tabela existente mapeia SOPs com seu ciclo de vida. projects
        e creators são domínios distintos.
    - table_name: sop_validation_log
      task_ids:
      - T1.2
      - T2.3
      - T2.4
      purpose: 'Log de todas as validações: intake completeness, schema validation,
        confidence scoring'
      status: new
      schema_minimal:
        id: uuid PRIMARY KEY DEFAULT gen_random_uuid()
        sop_id: text NOT NULL REFERENCES sop_catalog(sop_id)
        validation_type: text NOT NULL -- completeness|schema|confidence
        result: boolean NOT NULL
        score: numeric(5,2)
        errors: jsonb -- validation errors array
        task_id: text -- T1.2|T2.3|T2.4
        created_at: timestamptz DEFAULT now()
      rls_policy: Service role only (immutable log).
      justification: 'Mandamento 3: toda automação tem logging. Nenhuma tabela de
        log existente suporta validações de SOP.'
    - table_name: sop_quality_reports
      task_ids:
      - T3.1
      - T3.2
      - T3.3
      - T3.4
      - T3.5
      purpose: 'Relatórios de análise de qualidade: scores, recomendações, tier classification'
      status: new
      schema_minimal:
        id: uuid PRIMARY KEY DEFAULT gen_random_uuid()
        sop_id: text NOT NULL REFERENCES sop_catalog(sop_id)
        clarity_score: 'numeric(3,2) -- T3.1: 0-5'
        completeness_score: 'numeric(5,2) -- T3.2: 0-100'
        sinkra_adherence: boolean -- T3.3
        recommendations: 'jsonb -- T3.4: [{issue, severity, fix_suggestion}]'
        tier: text NOT NULL -- A|B|C|D
        routing_decision: text -- direct|rework|escalate
        compiled_at: timestamptz DEFAULT now()
      rls_policy: Service role writes. Authenticated users read own SOPs.
      justification: Relatórios de qualidade são específicos ao domínio SOP. Nenhuma
        tabela existente captura grading multi-dimensional.
    - table_name: sop_artifacts
      task_ids:
      - T4.1
      - T4.2
      - T4.3
      - T4.4
      - T5.1
      - T5.2
      - T5.3
      - T5.4
      - T5.5
      - T6.1
      purpose: 'Manifesto de artefatos gerados por SOP: ML outputs (JSON-LD, embeddings,
        GraphML, tokens) + docs (MD, PDF, HTML, Notion)'
      status: new
      schema_minimal:
        id: uuid PRIMARY KEY DEFAULT gen_random_uuid()
        sop_id: text NOT NULL REFERENCES sop_catalog(sop_id)
        artifact_type: text NOT NULL -- json_ld|embeddings|graphml|tokens|summary_md|guide_md|tech_md|pdf|html|notion_page
        storage_path: text
        notion_url: text
        file_size_bytes: bigint
        generated_by_task: text -- T4.1|T5.1|etc
        status: text DEFAULT 'pending' -- pending|generated|validated|published
        created_at: timestamptz DEFAULT now()
      rls_policy: 'Service role only for writes. Read: authenticated users (own SOPs).'
      justification: Pipeline dual-output gera 9+ artefatos por SOP. Nenhuma tabela
        existente gerencia manifesto de artefatos heterogêneos.
    - table_name: sop_audit_log
      task_ids:
      - T6.6
      - T6.5
      - T6.4
      - T1.3
      purpose: 'Trilha de auditoria imutável: todos os eventos do pipeline do intake
        ao publish'
      status: new
      schema_minimal:
        id: uuid PRIMARY KEY DEFAULT gen_random_uuid()
        sop_id: text NOT NULL REFERENCES sop_catalog(sop_id)
        event_type: text NOT NULL -- intake|validation|extraction|grading|rework|sign_off|publish|audit_complete
        task_id: text
        executor_type: text -- Human|Agent|Worker|Clone
        executor_id: text
        payload: jsonb -- event-specific data
        result: text -- success|failure|skipped
        created_at: timestamptz DEFAULT now()
      rls_policy: INSERT only for service role. NO UPDATE, NO DELETE. Row-level security
        enforced.
      immutability_note: 'Mandamento 9: audit trail não pode ser alterado. RLS policy
        proíbe UPDATE/DELETE.'
      justification: Mandamento 9 + T6.6 require imutable audit trail. Nenhuma tabela
        de log existente tem proteção imutável adequada para SOPs.
    storage:
      bucket_name: aiox-sop-files
      purpose: Armazenamento de documentos SOP (raw + converted) e artefatos gerados
      status: new
      paths:
        raw: raw/{sop_id}/original.{ext}
        converted: converted/{sop_id}/normalized.md
        artifacts: artifacts/{sop_id}/{artifact_type}.{ext}
        audit: audit/{sop_id}/audit-trail.json
      justification: Supabase Storage é a infraestrutura S3-compatible disponível.
        Bucket dedicado necessário para isolamento de domínio SOP.
      platform_status: existing
    edge_functions:
    - function_name: sop-intake-validator
      task_ids:
      - T1.2
      trigger: HTTP POST /functions/v1/sop-intake-validator
      status: new
      spec: 'Valida completeness do formulário de intake. Input: JSON payload. Output:
        {score, passed, missing_fields}. Logging: sop_validation_log.'
    - function_name: sop-id-cataloger
      task_ids:
      - T1.3
      trigger: HTTP POST (called by N8N after T1.2 success)
      status: new
      spec: Gera SOP-YYYYMMDD-NNN, cria record em sop_catalog, faz upload de arquivo
        para aiox-sop-files bucket.
  n8n:
    platform_status: existing
    production_url: https://n8n.allfluence.ai
    note: 'GAP-004 from infrastructure-map.yaml: workflow inventory requires API access.
      Workflows below are NET NEW — not duplicating unknowns, but cannot verify non-overlap.
      Recommend N8N API inventory before create.'
    workflows:
    - workflow_name: aiox-sop-intake-trigger
      task_ids:
      - T1.1
      - T1.2
      trigger: 'Webhook: Google Form submission → HTTP POST'
      action: Receive form payload → call sop-intake-validator Edge Function → route
        result
      status: new
      error_handler: true
      logging: true
      logging_target: Supabase sop_validation_log
    - workflow_name: aiox-sop-document-converter
      task_ids:
      - T2.1
      trigger: 'Event: T1.3 success (Supabase realtime → N8N webhook)'
      action: Download raw SOP from Supabase Storage → run pandoc/PyPDF2 conversion
        → upload normalized.md → emit T2.1.success event
      tools:
      - pandoc
      - PyPDF2
      - charset converter
      status: new
      error_handler: true
      logging: true
    - workflow_name: aiox-sop-extraction-pipeline
      task_ids:
      - T2.2
      - T2.3
      - T2.4
      trigger: 'Event: T2.1.success'
      action: 'T2.2: call OpenClaw Gateway /schema-mapper → T2.3: validate JSON schema
        (ajv) → T2.4: calculate confidence score → conditional routing'
      status: new
      error_handler: true
      logging: true
      retry_logic: T2.2 retries with validation errors injected (max 2 loops)
    - workflow_name: aiox-sop-quality-grading
      task_ids:
      - T3.1
      - T3.2
      - T3.3
      - T3.4
      - T3.5
      trigger: 'Event: T2.4 confidence_score >= 70'
      action: 'Parallel: T3.1 (OpenClaw/Clone clarity), T3.2 (completeness script),
        T3.3 (SINKRA adherence/Agent) → Join → T3.4 gap analysis (OpenClaw) → T3.5
        report compiler → tier routing'
      status: new
      error_handler: true
      logging: true
      parallel_groups:
      - T3.1
      - T3.2
      - T3.3
    - workflow_name: aiox-sop-rework-notifier
      task_ids:
      - T_REWORK_NOTIFY
      trigger: 'Event: T3.5 tier IN (''B'', ''C'')'
      action: Create ClickUp task in AIOX SOP Pipeline list → send email notification
        to SOP owner → set rework deadline
      status: new
      error_handler: true
      logging: true
    - workflow_name: aiox-sop-ml-conversion
      task_ids:
      - T4.1
      - T4.2
      - T4.3
      - T4.4
      trigger: 'Event: tier == ''A'' OR rework_completed'
      action: 'Parallel: T4.1 JSON-LD (OpenClaw), T4.2 Embeddings (OpenClaw via text-embedding-3-small),
        T4.3 GraphML (OpenClaw), T4.4 Tokenization (tiktoken script) → store all in
        aiox-sop-files/artifacts/'
      status: new
      error_handler: true
      logging: true
      parallel_groups:
      - T4.1
      - T4.2
      - T4.3
      - T4.4
    - workflow_name: aiox-sop-doc-generation
      task_ids:
      - T5.1
      - T5.2
      - T5.3
      - T5.4
      - T5.5
      trigger: 'Event: concurrent with T4 group (no dependency between T4 and T5)'
      action: 'Parallel: T5.1 Executive Summary (OpenClaw), T5.2 Operational Guide
        (OpenClaw), T5.3 Technical Reference (OpenClaw) → T5.4 pandoc render (PDF/HTML)
        + Notion API → T5.5 metadata injection'
      integrations:
      - pandoc
      - Notion API
      - OpenClaw Gateway
      status: new
      error_handler: true
      logging: true
      parallel_groups:
      - T5.1
      - T5.2
      - T5.3
    - workflow_name: aiox-sop-publishing-qa
      task_ids:
      - T6.1
      - T6.3
      trigger: 'Event: T5.5 success + T4 group success'
      action: 'T6.1: coherence validator (checklist script against manifest) → T6.3:
        feedback incorporation validator → conditional: tier A auto-approve or route
        to T6.4'
      status: new
      error_handler: true
      logging: true
    - workflow_name: aiox-sop-sign-off-reminder
      task_ids:
      - T6.4
      trigger: 'Schedule: daily check on pending T6.4 sign-offs'
      action: 'Day 1: ClickUp reminder task. Day 2: escalate to manager. Day 3: auto-approve
        with SLA_AUTO_APPROVED flag.'
      status: new
      error_handler: true
      logging: true
    - workflow_name: aiox-sop-deployment-publisher
      task_ids:
      - T6.5
      trigger: 'Event: T6.4 approved OR T6.3 auto-approved (tier A)'
      action: Git commit (SOP docs to docs repo) → Supabase record status=done → Notion
        pages publish → S3 copy to public bucket → emit audit event
      integrations:
      - Git SDK
      - Supabase SDK
      - Notion API
      - Supabase Storage SDK
      status: new
      error_handler: true
      logging: true
    - workflow_name: aiox-sop-audit-trail-writer
      task_ids:
      - T6.6
      trigger: 'Event: T6.5 success'
      action: Compile full event log → insert immutable record into sop_audit_log
        → archive JSON to aiox-sop-files/audit/ with server-side encryption
      status: new
      error_handler: true
      logging: true
      immutability_note: 'Mandamento 9: INSERT only. No UPDATE. SSE encryption on
        S3.'
