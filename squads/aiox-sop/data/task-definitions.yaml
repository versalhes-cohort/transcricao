- task: assinarFormalmenteSOP
  task_id: T6.4
  task_name: Formal sign-off by SOP owner
  atomic_layer: Atom
  responsavel_type: Human
  executor_role: SOP Owner (formal accountability sign-off)
  workflow: wf_publishing_qa
  domain: Tactical
  automation_decision: KEEP_MANUAL
  nota: Only triggered for Tier B/C or when unaddressed_critical > 0. Tier A auto-approved
    after T6.3.
  entrada:
  - campo: all_generated_artifacts
    tipo: Manifest JSON + artifact URLs
    origem: T6.1 manifest
    obrigatorio: true
  - campo: quality_analysis_report_json
    tipo: JSON
    origem: T3.5
    obrigatorio: true
  - campo: feedback_incorporation_result
    tipo: JSON
    origem: T6.3
    obrigatorio: true
  saida:
  - campo: approval_decision
    tipo: JSON
    destino: T6.5 (Deployment Worker)
    persistido: true
    schema: '{ decision: ''approve'' | ''reject'', notes: string, approved_by: string,
      approved_at: ISO8601, sla_auto_approved: bool }'
  pre_conditions:
  - All validations passed (T6.1, T6.3)
  - Sign-off request sent via ClickUp to SOP Owner
  - SOP Owner notified with artifact review links
  post_conditions:
    conditions:
    - Approval status logged in Supabase with timestamp
    - Decision and notes documented
    - 'If rejected: routed back to wf_rework_feedback with rejection notes (max 1
      rejection loop)'
    acceptance_criteria:
    - Decision is 'approve' or 'reject' (binary, no pending)
    - 'If 3 business days elapsed without response: auto-approve with SLA_AUTO_APPROVED
      flag'
    - Auto-approval requires manager countersign in audit trail
  performance:
    duration: 1-3 business days
    cost: Human time — variable
    cacheable: false
    sla_days: 3
    sla_business_days: 2
    error_handling:
      strategy: retry
      max_retries: 1
      fallback: 'Day 1: auto-reminder. Day 2: escalate to manager. Day 3: auto-approve
        with manager countersign + SLA_AUTO_APPROVED flag in audit trail.'
      alert: slack-deployment
      alert_on_failure: true
- task: publicarArtifatos
  task_id: T6.5
  task_name: Publish to repositories (Git/Supabase/Notion/S3)
  atomic_layer: Atom
  responsavel_type: Worker
  executor_role: Deployment Worker (Git SDK + Supabase SDK + Notion API + AWS S3 SDK)
  workflow: wf_publishing_qa
  domain: Operational
  automation_decision: AUTOMATE
  entrada:
  - campo: all_approved_artifacts
    tipo: Manifest JSON + artifact files
    origem: T6.4 (approval_decision.decision == 'approve') OR T6.3 (auto-approve path
      for Tier A)
    obrigatorio: true
  - campo: deployment_manifest
    tipo: JSON
    origem: N8N workflow (assembled from all artifact paths)
    obrigatorio: true
  saida:
  - campo: publish_status_json
    tipo: JSON
    destino: T6.6 (Audit Trail Writer)
    persistido: true
    schema: '{ git_commit_hash: string, supabase_record_id: string, notion_page_urls:
      string[], s3_object_keys: string[], all_succeeded: bool, published_at: ISO8601
      }'
  pre_conditions:
  - Approval status = 'approve' (from T6.4 or T6.3 auto-approve)
  - Git, Supabase, Notion, S3 credentials configured
  - Network accessible to all 4 target systems
  post_conditions:
    conditions:
    - Git commit pushed to repository
    - Supabase sop_catalog record status = 'published'
    - All Notion pages have published status
    - S3 objects accessible (public or pre-signed URL)
    - all_succeeded = true
    acceptance_criteria:
    - git_commit_hash is a valid 40-char SHA
    - supabase_record_id exists in sop_catalog table
    - notion_page_urls all return HTTP 200
    - S3 objects accessible within 10s of upload
    - Completes within 10 minutes
  performance:
    duration: < 10min
    cost: < $0.05 per SOP (S3 + API calls)
    cacheable: false
    sla_minutes: 10
    error_handling:
      strategy: retry
      max_retries: 3
      fallback: Escalate to Deployment Lead with detailed publish log via slack-deployment
      alert: slack-deployment
      alert_on_failure: true
- task: gerarAuditTrail
  task_id: T6.6
  task_name: Generate and archive audit trail
  atomic_layer: Atom
  responsavel_type: Worker
  executor_role: Audit Trail Writer (Supabase RLS logger + S3 server-side encrypted
    archiver)
  workflow: wf_publishing_qa
  domain: Operational
  automation_decision: AUTOMATE
  entrada:
  - campo: publish_status_json
    tipo: JSON
    origem: T6.5
    obrigatorio: true
  - campo: all_process_events_logs
    tipo: JSON (event stream)
    origem: Supabase sop_events_log — collected across all phases
    obrigatorio: true
  - campo: sop_metadata
    tipo: JSON
    origem: T1.3 (sop_id, version, owner)
    obrigatorio: true
  - campo: approval_decision
    tipo: JSON
    origem: T6.4 (or auto-approve metadata from T6.3)
    obrigatorio: true
  saida:
  - campo: audit_trail_record
    tipo: DB record (immutable)
    destino: 'Supabase sop_audit_log table (RLS: INSERT only, no UPDATE/DELETE)'
    persistido: true
  - campo: audit_archive_s3
    tipo: JSON (server-side encrypted)
    destino: S3 sop-audit-archive bucket
    persistido: true
  - campo: process_completion_event
    tipo: JSON event
    destino: Supabase realtime (triggers dashboard update)
    persistido: false
  pre_conditions:
  - Deployment successful (T6.5.all_succeeded == true)
  - All process logs collected from Supabase sop_events_log
  - 'Supabase sop_audit_log table has RLS: INSERT-only policy'
  post_conditions:
    conditions:
    - Audit record created with ISO8601 timestamp
    - Record is immutable (RLS blocks UPDATE and DELETE)
    - S3 object has server-side encryption enabled
    - process_completion_event emitted
    acceptance_criteria:
    - 'Audit record contains: sop_id, all phase timestamps, all executor IDs, approval
      decision, publish URLs'
    - S3 object has x-amz-server-side-encryption header
    - 'Supabase RLS test: UPDATE on audit record returns 403'
    - Completes within 2 minutes
  performance:
    duration: < 2min
    cost: < $0.01 per SOP
    cacheable: false
    sla_minutes: 2
    error_handling:
      strategy: retry
      max_retries: 3
      fallback: 'CRITICAL: alert Deployment Lead + manual audit entry required. Deployment
        NOT rolled back, but audit gap must be resolved within 24h.'
      alert: slack-deployment
      alert_on_failure: true
