  - id: AN_KE_127
    name: "Anti-Volatile-Hardcode (Never Hardcode Mutable State)"
    rule: "SE config de agent/squad/workflow tem valor mutável hardcoded → ENTÃO extrair para variável/config dinâmico. Valores hardcoded em configs de IA são BOMBA-RELÓGIO."
