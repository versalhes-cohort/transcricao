  - id: AN_KE_021
    name: "Repair Layer"
    rule: "SE LLM gera structured output → ENTÃO repair determinístico ANTES de validar. Repair=$0, retry=tokens"
    zone: impacto
    trigger: "Pipeline com LLM gerando YAML/JSON"
    evidence: "yaml-repair.py corrigiu 11 erros Opus em <1s vs 5 iterações LLM falhando"

  - id: AN_KE_022
    name: "Format Follows Generator"
    rule: "SE LLM gera output → ENTÃO JSON (seguro). SE humano lê → converter JSON→YAML no destino"
    zone: genialidade
    trigger: "Escolhendo formato de output pra LLM"
    evidence: "3/4 erros YAML não existem em JSON. Opus 0% YAML vs ~100% JSON"

  - id: AN_KE_023
    name: "Tier System é Invisível"
    rule: "SE abstração sobrescreve decisão do usuário → LOGAR modelo REAL + oferecer --force bypass"
    zone: excelencia
    trigger: "Implementando routing de modelo/runtime"
    evidence: "--model haiku resolvia pra opus silenciosamente. Fix: --force-model"

  - id: AN_KE_024
    name: "Resume = Same Run"
    rule: "SE --phase N (resume) → RESOLVER última run → continuar nela. NUNCA criar novo RUN_ID"
    zone: excelencia
    trigger: "Implementando resume em pipeline multi-fase"
    evidence: "--phase 8 criou run vazia → QA 4/100. Fix: resolver symlink latest"

  # ═══════════════════════════════════════════════════════════════
  # EXTRATOS DE SESSÃO (AN_KE_025 — AN_KE_030)
  # ═══════════════════════════════════════════════════════════════

  - id: AN_KE_025
    name: "Determinism Over LLM"
    rule: "SE processo repete sem variação ou exige precisão absoluta → ENTÃO Worker/Script. SE só interpretação → ENTÃO LLM."
    zone: genialidade
    trigger: "Implementando lógicas de contagem, verificação ou paths."
    evidence: "LLMs falham ao validar caminhos ou contar itens; bash/python acerta e custa $0."

  - id: AN_KE_026
    name: "Squad Agnosticism"
    rule: "SE criar/editar Squad → ENTÃO não hardcode regras do projeto nele. Use Fonte da Verdade do Workspace."
    zone: excelencia
    trigger: "Definindo arquitetura e regras de negócio para um Squad."
    anti_pattern: "Empacotar lógica do cliente X no core do squad genérico."

  - id: AN_KE_027
    name: "Zero Emojis & Design Consistente"
    rule: "SE construir UI/Dashboard/Books → ENTÃO NUNCA use emojis. Use SVGs/Lucide e Tailwind/Shadcn rigorosos."
    zone: impacto
    trigger: "Criando ou refatorando frotend e relatórios gerenciais."
    anti_pattern: "Adicionar emojis pra tentar 'humanizar' o sistema."

  - id: AN_KE_028
    name: "Self-Contained Encapsulation"
    rule: "SE um squad precisa de script extra → ENTÃO deve morar na própria pasta do squad, não em infra global (se exclusividade)."
    zone: excelencia
    trigger: "Criando scripts ou dependências exclusivas de um Agente."
    anti_pattern: "Despejar .py ou .sh no root, impedindo a migração modular do squad."

  - id: AN_KE_029
    name: "Survival by Documentation (Reset Immunity)"
    rule: "SE descobriu padrão firme ou assumiu premissa/fix → ENTÃO documente na hora (Se não sobrevive ao reset, não documentou)."
    zone: excelencia
    trigger: "Ao resolvermos loop de falha/concordarmos numa decisão na sessão."
    anti_pattern: "Achar que a IA vai lembrar da regra que mandou usar no script daqui a 3 janelas."

  - id: AN_KE_030
    name: "Anti-Fingerprint AI Detox"
    rule: "SE gerar materiais públicos/Books → ENTÃO remova 100% de assinaturas IA ('Neste artigo', travessões, tom fofo)."
    zone: excelencia
    trigger: "Escrevendo resumos, livros, readmes externos na voz do cliente."
    evidence: "A repetição mecânica destrói a percepção de alto valor."

  - id: AN_KE_031
    name: "Localhost QA Gate"
    rule: "SE código modifica funcionalidades core ou UI → ENTÃO o teste local é obrigatório atrelado à validação visual e lógica."
    zone: impacto
    trigger: "Escrevendo/refatorando código ou integrações."
    anti_pattern: "Entregar deploy para prod sem teste rodar funcional num localhost na máquina do dev."
    
  - id: AN_KE_032
    name: "Schema Immutability"
    rule: "SE planejar mudanças de schema → ENTÃO NUNCA edite sem um Human Gate approval explícito."
    zone: impacto
    trigger: "Operações envolvendo tabelas, db-migrations ou chaves globais."
    evidence: "A perda de integridade num hub central é de dificílima recuperação sem backup imediato."
    
  - id: AN_KE_033
    name: "Squads = Source of Truth"
    rule: "SE criando skill/agent/task → ENTÃO squads/ é SOT. .claude/skills/ é PROJEÇÃO. Nunca criar algo que vive SÓ em .claude/. Portabilidade: codex, gemini, claude."
    zone: genialidade
    trigger: "Criando ou editando skills, agents, tasks."
    anti_pattern: "Skill que existe apenas em .claude/skills/ sem correspondência em squads/."
    evidence: "'a fonte da verdade é sempre o squads/... nao devem viver nunca só dentro de .claude, isso deve virar uma lei'"

  - id: AN_KE_034
    name: "Ghostwriting (Autorship)"
    rule: "SE compilar documentos valiosos/books/índices → ENTÃO nunca os assine como IA; a autoria da metodologia é de Alan Nicolas."
    zone: excelencia
    trigger: "Gerando documentos na 1ª pessoa do Alan para base de conhecimento."
    anti_pattern: "Deixar tags do Claude ou justificar formatação através da perspectiva sintética."



  - id: AN_KE_035
    name: "CLI First Architecture"
    rule: "SE for arquitetar uma nova funcionalidade (squad, agent, tool) ENTÃO siga estritamente a ordem: 1. CLI First → 2. Observability Second → 3. UI Third."
    zone: genialidade
    trigger: "Avaliando ou desenhando arquitetura de agentes e dashboards."
    anti_pattern: "Colocar a UI como requisito para o sistema rodar."

  - id: AN_KE_036
    name: "Veto Sobre LLM Goodwill"
    rule: "SE uma task estrita precisa rodar um validador antes de seguir (ex: validation.sh) → ENTÃO crie uma \"Condition Block/Veto\". Trave o pipeline até existir a saída exata daquele validador. Não confie na proatividade ou no promissório da IA."
    zone: impacto
    trigger: "Definindo processos que o LLM precisa obrigatoriamente executar antes de seguir."
    anti_pattern: "Garantir no prompt 'Por favor execute este script' sem um BLOCK rígido."

  - id: AN_KE_037
    name: "Single Source of Truth (Business)"
    rule: "SE a LLM precisar buscar informações sobre QUEM a empresa é e PARA ONDE vai → ENTÃO direcione a leitura EXCLUSIVAMENTE ao `Workspace` corporativo correspondente. Nunca tire verdades vitais destas em arquivos de código em pastas periféricas."
    zone: excelencia
    trigger: "Buscando ou armazenando dados operacionais, brand ou stack da empresa."
    anti_pattern: "Salvar variáveis do negócio pulverizadas em /docs ou tabelas do Supabase."

  - id: AN_KE_038
    name: "Gap de Reasoning = Processo Vago"
    rule: "SE tentado a usar Opus/o3 para algo simples → ENTÃO auditar SOP primeiro. Haiku + checklist rigoroso > Opus + instrução vaga. Conserte a receita antes de trocar a panela."
    zone: genialidade
    trigger: "LLM falha repetidamente e a tentação é trocar para modelo mais caro."
    anti_pattern: "Culpar inteligência do modelo ao invés da falta de checklist."
    evidence: "AN_KE_005 + Epic 71 runner-lib + benchmark 2026-03-29 (Gemini falhou por formato, não reasoning)"

  - id: AN_KE_039
    name: "Checkpoint Categórico de Modelos Mentais"
    rule: "SE há Agentes assumindo posições chave de raciocínio onde a filosofia interna de Alan (e experts copiados) importam → ENTÃO institua um 'Checkpoint Gate'. O sistema deve obrigar fisicamente o Agente a acionar a \"Leitura do Modelo Mental / Heurísticas de Base\" periodicamente na execução em cascata."
    zone: excelencia
    trigger: "Quando agentes executam tarefas mas ignoram os modelos mentais da base."
    anti_pattern: "Achar que a IA vai ler o oalanicolas.md espontaneamente no meio do job."

  - id: AN_KE_040
    name: "Agnosticização Mandatória em Infra"
    rule: "SE o código for uma engrenagem de infra (ex: extractors, validators, deployers compartilhados) → ENTÃO proíba hardcoding. Ele DEVE aceitar argumentos dinâmicos ($1, $2) para operar de forma AGNÓSTICA sobre qualquer path, projeto ou URL. Os arquivos em `/infrastructure` não devem reconhecer o usuário atual."
    zone: excelencia
    trigger: "Criando scripts compartilhados ou utilitários root."
    anti_pattern: "Amarrar o script de deploy ao nome hardcoded 'mmos'."

  - id: AN_KE_041
    name: "Output Path Discipline"
    rule: "SE artefato é resultado de execução → ENTÃO outputs/{squad-name}/. NUNCA dentro de squads/ ou workspace/."
    zone: impacto
    trigger: "Salvando resultados de pipeline, análise, validação."
    anti_pattern: "Pipeline salvando resultados dentro da pasta do squad."
    evidence: "'o local certo para salvar isso é outputs na pasta principal e nao dentro do squad sinkra'"

  - id: AN_KE_042
    name: "Don't Regress Working Code"
    rule: "SE código funciona em localhost → ENTÃO preservar. Mudanças aditivas, nunca destrutivas. SE regressão → git revert imediato."
    zone: excelencia
    trigger: "IA propondo refatoração ou simplificação de código funcional."
    anti_pattern: "Trocar campo real (image_url) por derivado (slug) sem testar."
    evidence: "'tava funcionando localhost, pq está revertendo algo que estava funcionando?'"

  - id: AN_KE_043
    name: "Zero Achismos"
    rule: "SE a IA perceber uma lacuna estratégica ao criar a solução pedida a ela → ENTÃO acione a diretiva de Grounded Inference: \"Apenas entregue processos baseados integralmente nos templates disponíveis na base e evidências já mapeadas\"."
    zone: impacto
    trigger: "Quando a IA tenta preencher lacunas desenhando estratégias sem dados e extrapolando."
    anti_pattern: "Inventar uma solução brilhante baseada em teoria LLM, sem template humano-validado."

  - id: AN_KE_044
    name: "URL = State Truth (Deep Linking)"
    rule: "SE você implementar a gestão de estado central de um componente pesado de navegação → ENTÃO ele DEVE modificar dinamicamente a URL usando searchParams ou Pathing Slug. A URL dita quem é o State do aplicativo; NUNCA deixe estado trancado na caixinha de memória da página, se o usuário der refresh, a página não deve resetar misteriosamente para o estado zero."
    zone: excelencia
    trigger: "Construindo gerenciamento de estado em UIs como listas, filtros ou tabs."
    anti_pattern: "Fazer um `useState` local onde dar refresh na página apaga o histórico do app."


  - id: AN_KE_045
    name: "Subtraction First Strategy"
    rule: "SE você encontrar um gargalo burocrático, lento ou atritivo numa arquitetura ou modelo de conhecimento → ENTÃO DESTRUA em vez de construir paliativos em cima. Pare de adicionar plugins e scripts de conserto; aplique \"Subtract not Add\"."
    zone: impacto
    trigger: "Quando avaliando novos recursos, integrações ou acréscimo de conteúdo."
    anti_pattern: "Tentar resolver um gap adicionando mais passos em vez de remover a complexidade base."

  - id: AN_KE_046
    name: "Fórmula da Transformação de Voz"
    rule: "SE o Agent precisar escrever textos longos ou argumentos narrativos de alta conversão → ENTÃO exija o enquadramento na fórmula inquebrável: [Vulnerabilidade + Dados + História + Desafio Socrático]. Sem isto é apenas dados; com isto é \"Transformação\"."
    zone: genialidade
    trigger: "Quando desenvolvendo copywriting, livros, ghostwriting ou artigos usando a voz de Alan Nicolas."
    anti_pattern: "Gerar resumos padronizados com 'neste artigo falaremos sobre', ignorando riscos pessoais no texto."

  - id: AN_KE_047
    name: "AI-Predictable Design Systems"
    rule: "SE for adotar um framework de CSS/Design System → ENTÃO NUNCA permita configurações caóticas puramente visuais (como \"SASS classes com 99 variaveis de rem magicas\"). Trabalhe em lógicas nominais rígidas (CVA) onde a sintaxe por si só revele para o Claude qual a variação a se escalar e usar."
    zone: impacto
    trigger: "Arquitetando e configurando frameworks de CSS/UI e documentando tokens (ex: Shadcn)."
    anti_pattern: "Focar o Design System apenas em consumo humano, com regras complexas demais para agentes parsearem."

  - id: AN_KE_048
    name: "Handoff Psicológico Completo"
    rule: "SE você for delinear as ações do dia → ENTÃO delimite-as numa \"Trilha de Completude Absoluta 100%\". Pedaços abertos e features semi-refatoradas não geram closure psicológico e trazem fadiga para as próximas interações."
    zone: excelencia
    trigger: "Formatando sessões de trabalho e definindo o fechamento (Handoffs)."
    anti_pattern: "Pausar no meio de 3 tarefas e causar ansiedade sobre o estado incompleto do sistema."

  - id: AN_KE_049
    name: "Ship First, Doc Later"
    rule: "SE no meio de implementação → ENTÃO código funcional > documentação. README DEPOIS que funciona. Exceção: handoffs e decision logs SEMPRE."
    zone: impacto
    trigger: "IA propondo criar README ou documentação extensa antes de terminar feature."
    anti_pattern: "README de 200 linhas pra feature que muda em 30 minutos."
    evidence: "'nao precisa de readme, vamos avancar' — padrão recorrente multi-projeto"

  # ── Brand Positioning (NOT engineering — use in copy/marketing contexts) ──

  - id: AN_KE_050
    name: "Inimigo Zero: Complexidade Inútil (WIP>1)"
    rule: "SE comunicar vantagem do AIOX/Lendária → ENTÃO destruir publicamente ansiedade tecnológica do mercado. WIP=1, execução disciplinada. Absorve AN_KE_051 (Ressurreição > Acúmulo)."
    zone: impacto
    domain: brand
    trigger: "Copy de vendas, ICPs, landing pages, ofertas."
    anti_pattern: "Induzir audiência a começar frentes paralelas (WIP elevado) ou vender 'curso de IA'."
    evidence: "Livro da Oferta (Story Selling) — documento primário pastado por Alan"

  - id: AN_KE_051
    name: "Idempotent Operations"
    rule: "SE operação pode rodar 2x → ENTÃO DEVE ser idempotente. IF NOT EXISTS guards em migrations, ON CONFLICT em seeds. Conferir antes se já foi aplicado."
    zone: excelencia
    trigger: "Criando migrations, seeds, scripts de setup."
    anti_pattern: "ALTER TABLE RENAME sem IF EXISTS guard — falha na segunda execução."
    evidence: "Migration falhou: 'column nome_clone does not exist' — já tinha sido renomeada"

  - id: AN_KE_052
    name: "Contraste de Valor Ativo"
    rule: "SE definir manifesto → ENTÃO frases duais espelhadas (Não Prometemos X, Cobramos Y). Polarização deliberada. Demonstre quem repelimos."
    zone: excelencia
    domain: brand
    trigger: "Manifestos, copy institucional, textos de valores (Brand Position)."
    anti_pattern: "Tom ameno e complacente para agradar massas."
    evidence: "Manifesto Lendário — sessão c5b4f186. 'Não prometemos facilidade. Prometemos transformação.'"

  - id: AN_KE_053
    name: "Regra da Exclusividade Visual"
    rule: "SE o componente raiz (base) do shadcn e o tema default resolverem bem → ENTÃO DEIXE-O RESPIRAR. SÓ aplique overrides visuais fortes nas exatas chaves visuais sagradas da Academia (Ex: O detalhe Dourado como Acento, O esquema Monocromático Absoluto, Formas Rígidas de cantos)."
    zone: excelencia
    trigger: "Sempre que manipular utilitários Tailwind ou base de bibliotecas como Shadcn."
    anti_pattern: "Sobrescrever o core do framework CSS ou forçar variáveis onde a biblioteca já possui helpers ideais."

  - id: AN_KE_054
    name: "Estrutura Orgânica de Diretórios"
    rule: "SE você precisar organizar arquivos em diretórios → ENTÃO NUNCA use \"01_Marketing\", \"02_Vendas\" SOMENTE use numeração se a natureza do dado exigir estrita linearidade invariável (ex: Módulos de um Curso)."
    zone: excelencia
