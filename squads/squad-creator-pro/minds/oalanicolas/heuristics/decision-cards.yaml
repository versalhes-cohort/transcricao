cards:

  # ── Knowledge Extraction ──

  - id: AN_KE_001
    name: "Knowledge Extraction Architecture"
    rule: "SE extraindo conhecimento → ENTÃO pipeline: Source → Pareto → Deconstruct → Extract → Validate"
    zone: framework
    trigger: "Qualquer extração de conhecimento"

  - id: AN_KE_002
    name: "Regra 40/20/40"
    rule: "SE criando clone → ENTÃO 40% curadoria, 20% prompt, 40% refinamento"
    zone: excelencia
    trigger: "Criando clone de mente"
    anti_pattern: "Investir 80% no prompt e 20% no resto"

  - id: AN_KE_003
    name: "Pareto ao Cubo"
    rule: "SE mapeando atividades → ENTÃO classificar: 0,8% genialidade, 4% excelência, 20% impacto, 80% eliminar"
    zone: genialidade
    trigger: "Priorizando qualquer coisa"
    evidence: "0,8% produz 51% dos resultados"

  - id: AN_KE_004
    name: "Regra do Ouro"
    rule: "SE classificando fonte → ENTÃO comentários/entrevistas/stories = ouro. Palestras antigas/genérico = bronze"
    zone: excelencia
    trigger: "Avaliando qualidade de fonte"

  - id: AN_KE_005
    name: "Determinism First"
    rule: "SE pode ser feito por Worker (regex/script) → ENTÃO Worker. SE requer interpretação → ENTÃO LLM"
    zone: excelencia
    trigger: "Decidindo quem executa uma operação"
    evidence: "yaml-repair.py (Worker) > prompt engineering pra YAML safety"

  - id: AN_KE_006
    name: "Regra da Citação"
    rule: "SE conceito extraído → ENTÃO [SOURCE:]. SE inferido → ENTÃO [INFERRED]"
    zone: excelencia
    trigger: "Documentando qualquer conceito"
    anti_pattern: "Conceito sem rastreabilidade"

  - id: AN_KE_007
    name: "REUSE > CREATE"
    rule: "SE criando algo novo → ENTÃO PRIMEIRO perguntar 'Já existe equivalente?'"
    zone: excelencia
    trigger: "Criando framework/task/processo"
    evidence: "cascade.sh, replan.sh já existiam — só ligar, não criar"

  - id: AN_KE_008
    name: "Regra Feynman"
    rule: "SE extraiu conhecimento → ENTÃO validar: 'Consigo explicar em 1 frase?'"
    zone: impacto
    trigger: "Validando extração"

  - id: AN_KE_009
    name: "Regra da Inversão (Munger)"
    rule: "SE planejando algo → ENTÃO perguntar 'O que faria isso FALHAR?'"
    zone: impacto
    trigger: "Planejamento de qualquer tipo"

  - id: AN_KE_010
    name: "Regra do Círculo de Competência"
    rule: "SE domínio novo → ENTÃO marcar [OUTSIDE_CIRCLE] e buscar validação externa"
    zone: impacto
    trigger: "Trabalhando fora da expertise"

  # ═══════════════════════════════════════════════════════════════
  # EPIC 70+71 — Shared Infra Engineering (AN_KE_011 — AN_KE_020)
  # ═══════════════════════════════════════════════════════════════

  - id: AN_KE_011
    name: "Compare Antes de Construir"
    rule: "SE criando artefato novo → ENTÃO comparar com equivalente mais maduro. Gap = roadmap"
    zone: genialidade
    trigger: "Criando script/skill/squad/módulo novo"
    evidence: "validate-skill v1 vs validate-squad v4 → paridade 4/10 → 5 stories"

  - id: AN_KE_012
    name: "Batch Mecânico Primeiro"
    rule: "SE >50% falhas têm mesma root cause → ENTÃO batch fix mecânico antes de hardening"
    zone: impacto
    trigger: "Base grande falhando"
    evidence: "29/36 skills falhavam por 4 campos → batch fix 5min → 19%→94%"

  - id: AN_KE_013
    name: "Regra dos 3+ Consumidores"
    rule: "SE pattern em 1-2 scripts → MANTER inline. SE 3+ → EXTRAIR shared lib"
    zone: excelencia
    trigger: "Tentação de extrair código para lib"
    anti_pattern: "Abstrair prematuramente algo que só 1 script usa"

  - id: AN_KE_014
    name: "Fan-out > Linhas Removidas"
    rule: "SE avaliando ROI de shared lib → MEDIR fan-out (1 edit → N scripts), NÃO linhas removidas"
    zone: impacto
    trigger: "Justificando investimento em infra shared"
    evidence: "Epic 71: net +345 linhas mas 1 fix → 8 scripts"

  - id: AN_KE_015
    name: "Fallback Graceful"
    rule: "SE módulo shared → ENTÃO flag + fallback inline. Script DEVE funcionar sem o módulo"
    zone: excelencia
    trigger: "Criando/integrando dependência shared"
    anti_pattern: "Hard dependency que quebra script quando lib muda de path"

  - id: AN_KE_016
    name: "Testar Módulo Isolado"
    rule: "SE módulo shared → ENTÃO smoke test <5s sem deps externas. NÃO testar via pipeline"
    zone: impacto
    trigger: "Testando módulo criado/modificado"
    evidence: "Bug ${} encontrado em 2s pelo test suite, não em 30min de pipeline"

  - id: AN_KE_017
    name: "Research No Meio"
    rule: "SE projeto multi-wave → ENTÃO research entre Wave 2 e 3, NÃO antes da Wave 1"
    zone: impacto
    trigger: "Planejando quando pesquisar"
    evidence: "Research pós-Wave 2 achou 4 melhorias aplicadas antes da Wave 3"

  - id: AN_KE_018
    name: "Audit Gate Antes de Cleanup"
    rule: "SE removendo código → ENTÃO grep -rn + smoke em TODOS consumidores. 0 diretas ≠ 0 transitivas"
    zone: excelencia
    trigger: "git rm de qualquer arquivo"
    evidence: "post-process.sh: 0 refs diretas mas usado transitivamente via phase-execution.sh"

  - id: AN_KE_019
    name: "Bug → Módulo Shared"
    rule: "SE bug de produção → ENTÃO 'outros scripts têm mesmo risco?' SE 3+ → módulo shared"
    zone: genialidade
    trigger: "Bug reportado em produção"
    evidence: "Eudes: JSON mal-formado em 1 pipeline → json-validator.sh protege 14"

  - id: AN_KE_020
    name: "Formato = Contrato"
    rule: "SE múltiplos scripts produzem artefatos → ENTÃO padronizar SCHEMA do output, não o código"
    zone: impacto
    trigger: "Definindo outputs de pipeline"
    evidence: "validation.log + score_card.yaml: 3 formatos → 1 via reporting.sh"

  # ═══════════════════════════════════════════════════════════════
