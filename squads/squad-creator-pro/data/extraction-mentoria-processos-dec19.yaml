# PARADIGM INVERSIONS
# ═══════════════════════════════════════════════════════════════════════════════

paradigm_inversions:
  - id: "INV-001"
    conventional: "Automatize tudo o mais rapido possivel"
    expert_position: "Desenhe manualmente primeiro, automatize depois"
    reasoning: "Sem entender o processo, a automacao nao funciona"
    evidence: "[SOURCE: AN @26:00-28:00]"

  - id: "INV-002"
    conventional: "Treinar o time para entender a ferramenta/processo"
    expert_position: "Limitar a visao e impossibilitar caminhos errados"
    reasoning: "PV tentou treinar todo mundo -> caos. Limitou visao -> funcionou"
    evidence: "[SOURCE: PV @1:24:00-1:33:00]"

  - id: "INV-003"
    conventional: "Humano precisa criar criativos de qualidade"
    expert_position: "IA fazendo 100 criativos a 90% > humano fazendo 1 a 100%"
    reasoning: "Descoberta de hit e probabilistica, nao deterministica"
    evidence: "[SOURCE: AN @2:17:00-2:19:00]"

  - id: "INV-004"
    conventional: "Depoimento bom e qualquer feedback positivo"
    expert_position: "Depoimento 'ta bom, gostei' e RUIM. Lendario = jornada de transformacao"
    reasoning: "Depoimento sem jornada nao converte"
    evidence: "[SOURCE: AN @33:00-35:00]"

  - id: "INV-005"
    conventional: "Erro do executor e culpa do executor"
    expert_position: "Erro na ponta = falha de comunicacao de quem esta acima"
    reasoning: "Potencial de mudanca esta no processo, nao na pessoa"
    evidence: "[SOURCE: PV @1:27:00-1:28:00]"

# ═══════════════════════════════════════════════════════════════════════════════
# PV INSIGHT: 3 TIPOS DE DOCUMENTADORES DE PROCESSO
# ═══════════════════════════════════════════════════════════════════════════════

pv_3_types_of_documenters:
  source: "[SOURCE: PV @2:25:00-2:27:00]"
  context: "Quando PV pediu para cada membro do time descrever o que faz no dia a dia"
  types:
    - type: "Supervalorizador"
      behavior: "Descreve todas tarefas como muito dificeis e demoradas"
      motivation: "Quer mostrar que seu trabalho e complexo/importante"
      adaptacao: "Desafiar tempos estimados com dados reais"

    - type: "Resumidor"
      behavior: "Bota tudo em blocos grandes, so marcos, nao divide em tarefas"
      motivation: "Nao quer passar que esta cheia de coisa. Quer menos trabalho"
      adaptacao: "Pedir detalhamento especifico de cada marco"

    - type: "Criterioso (ideal)"
      behavior: "Retrata realidade exatamente como e, super documenta"
      motivation: "Habito natural de documentacao, vai a fundo"
      adaptacao: "Dar autonomia, usar como referencia para os outros"

  insight: "Saber o tipo de documentador ANTES de estruturar o processo muda como voce interpreta o dump"
