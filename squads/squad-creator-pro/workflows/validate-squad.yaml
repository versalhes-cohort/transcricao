workflow:
  id: validate-squad
  name: Squad Validation Workflow
  version: 2.0.0
  description: |
    Tiered, context-aware validation of AIOX squads using explicit atomic tasks.
  type: validation
  state_machine:
    states: [init, deterministic-checks, cross-reference-validation, quality-assessment, contextual-validation, verdict, complete, failed]
    transitions:
      - trigger: start
        source: init
        dest: deterministic-checks
      - trigger: deterministic_checks_complete
        source: deterministic-checks
        dest: cross-reference-validation
      - trigger: deterministic_checks_failed
        source: deterministic-checks
        dest: failed
      - trigger: cross_reference_validation_complete
        source: cross-reference-validation
        dest: quality-assessment
      - trigger: cross_reference_validation_failed
        source: cross-reference-validation
        dest: failed
      - trigger: quality_assessment_complete
        source: quality-assessment
        dest: contextual-validation
      - trigger: quality_assessment_failed
        source: quality-assessment
        dest: failed
      - trigger: contextual_validation_complete
        source: contextual-validation
        dest: verdict
      - trigger: contextual_validation_failed
        source: contextual-validation
        dest: failed
      - trigger: verdict_complete
        source: verdict
        dest: complete
      - trigger: verdict_failed
        source: verdict
        dest: failed
      - trigger: fail
        source: "*"
        dest: failed
  sequence:
    - step: deterministic-checks
      id: deterministic-checks
      phase: 1
      phase_name: Deterministic Checks
      task: validate-squad-deterministic
      task_ref: validate-squad-deterministic
      agent: "@squad-chief"
      action: execute_type-detect_structure_security_coverage
      outputs:
        - type_classification
        - structure_report
        - security_report
        - coverage_report
      next: cross-reference-validation
    - step: cross-reference-validation
      id: cross-reference-validation
      phase: 2
      phase_name: Cross-Reference Validation
      task: validate-squad-cross-references
      task_ref: validate-squad-cross-references
      agent: "@squad-chief"
      action: execute_validate-internal-references-and-dependencies
      outputs:
        - xref_pass
        - xref_fail
        - broken_references
      next: quality-assessment
    - step: quality-assessment
      id: quality-assessment
      phase: 3
      phase_name: Quality Assessment
      task: validate-squad-quality
      task_ref: validate-squad-quality
      agent: "@squad-chief"
      action: execute_ai-powered-quality-evaluation
      outputs:
        - tier3_score
        - dimension_scores
      next: contextual-validation
    - step: contextual-validation
      id: contextual-validation
      phase: 4
      phase_name: Contextual Validation
      task: validate-squad-contextual
      task_ref: validate-squad-contextual
      agent: "@squad-chief"
      action: execute_type-specific-validation-based-on-detected-squad-type
      outputs:
        - tier4_score
        - type_specific_checks
      next: verdict
    - step: verdict
      id: verdict
      phase: 5
      phase_name: Verdict (Veto Gates + Report)
      task: validate-squad-verdict
      task_ref: validate-squad-verdict
      agent: "@squad-chief"
      action: execute_veto-gates-and-generate-report
      outputs:
        - veto_status
        - final_score
        - result
        - report_path
    - workflow_end:
        id: complete
        action: workflow_complete
  governance_protocol: squads/squad-creator/protocols/ai-first-governance.md
  ci_policy:
    blocking_deterministic_only: true
    semantic_checks_in_checkpoints: true
  inputs:
    squad_name:
      type: string
      required: true
      description: Name of squad to validate
      examples:
        - "{squad-name}"
        - my-squad
        - new-squad
    squad_path:
      type: string
      required: false
      description: "Override path (default: squads/{squad_name})"
    type_override:
      type: enum
      required: false
      values:
        - expert
        - pipeline
        - hybrid
      description: Force squad type detection
    verbose:
      type: boolean
      default: false
      description: Show all checks, not just failures
  outputs:
    result:
      type: enum
      values:
        - PASS
        - CONDITIONAL
        - FAIL
      description: Validation result
    score:
      type: number
      range:
        - 0
        - 10
      description: Quality score
    squad_type:
      type: enum
      values:
        - expert
        - pipeline
        - hybrid
      description: Detected or overridden squad type
    report_path:
      type: string
      description: Path to detailed validation report
  execution:
    mode: hybrid
    script: scripts/validate-squad.sh
    task: tasks/validate-squad.md
    strategy: |
      1. Script runs deterministic checks (Tier 1, Security, Cross-refs)
      2. AI evaluates qualitative dimensions (Tier 3, Tier 4)
      3. Combined score determines result
  phases:
    - phase: 1
      name: Deterministic Checks
      description: "Consolidated: type detection, structure validation, security scan, coverage analysis"
      task_ref: validate-squad-deterministic
      executor: script
      duration: < 60 seconds
      blocking: true
      sub_steps:
        - step: type-detection
          actions:
            - action: Count agents
              command: find {squad_path}/agents -name '*.md' | wc -l
            - action: Check voice_dna presence
              command: grep -r 'voice_dna' {squad_path}/agents | wc -l
            - action: Check workflow presence
              command: find {squad_path}/workflows -name '*.yaml' | wc -l
            - action: Check heuristics presence
              command: grep -rE '(PV_|SC_|heuristic)' {squad_path} | wc -l
          output:
            field: squad_type
            logic: |
              expert_score = agents >= 5 ? 2 : 0 + voice_dna > 0 ? 3 : 0
              pipeline_score = workflows > 0 ? 3 : 0 + tasks > agents*3 ? 2 : 0
              hybrid_score = heuristics > 0 ? 3 : 0
              return max(expert, pipeline, hybrid)
        - step: structure-validation
          checks:
            - id: T1-CFG-001
              name: config.yaml exists
              command: test -f {squad_path}/config.yaml
              severity: BLOCKING
            - id: T1-CFG-002
              name: config.yaml valid YAML
              command: python3 -c "import yaml; yaml.safe_load(open('{squad_path}/config.yaml'))"
              severity: BLOCKING
            - id: T1-CFG-003
              name: Required fields present
              command: Check name, version, description, entry_agent
              severity: BLOCKING
            - id: T1-WSP-001
              name: workspace_integration level declared
              command: Check workspace_integration.level or workspace_integration_level is present
              severity: BLOCKING
            - id: T1-WSP-002
              name: workspace_integration level valid
              command: Check level in [none, read_only, controlled_runtime_consumer, workspace_first]
              severity: BLOCKING
            - id: T1-ENT-001
              name: Entry agent exists
              command: test -f {squad_path}/agents/{entry_agent}.md
              severity: BLOCKING
            - id: T1-ENT-002
              name: Entry agent activatable
              command: grep -q 'activation-instructions' {entry_agent_path}
              severity: BLOCKING
            - id: T1-DIR-001
              name: agents/ directory exists
              command: test -d {squad_path}/agents
              severity: BLOCKING
          gate:
            id: GATE-T1
            name: Structure Gate
            type: automated
            severity: blocking
            pass_condition: all checks pass
            fail_action: ABORT validation
        - step: security-scan
          categories:
            - category: API Keys & Tokens
              checks: [SEC-001, SEC-002, SEC-003, SEC-004]
              severity: BLOCKING
            - category: Cloud Credentials
              checks: [SEC-005, SEC-006, SEC-007, SEC-008]
              severity: BLOCKING
            - category: Private Keys
              checks: [SEC-009, SEC-010]
              severity: BLOCKING
            - category: Database URLs
              checks: [SEC-011, SEC-012]
              severity: BLOCKING
            - category: Sensitive Files
              checks: [SEC-013, SEC-014, SEC-015]
              severity: BLOCKING
            - category: Code Vulnerabilities
              checks: [SEC-016, SEC-017, SEC-018]
              severity: WARNING
          gate:
            id: GATE-SEC
            name: Security Gate
            type: automated
            severity: blocking
            pass_condition: 0 HIGH severity findings
            fail_action: VETO (V5)
        - step: coverage-analysis
          checks:
            - id: T2-COV-001
              name: Checklist coverage
              metric: checklists / complex_tasks
              threshold: ">= 0.30"
              severity: WARNING
            - id: T2-ORP-001
              name: Orphan tasks
              metric: unreferenced tasks
              threshold: <= 2
              severity: WARNING
            - id: T2-DAT-001
              name: Data file usage
              metric: referenced / total data files
              threshold: ">= 0.50"
              severity: WARNING
            - id: T2-WSP-001
              name: Workspace references when required
              metric: workspace refs in tasks/workflows/config when level != none
              threshold: ">= 1"
              severity: BLOCKING
            - id: T2-WSP-002
              name: Workspace-first scripts present when required
              metric: bootstrap + essentials validator scripts when level == workspace_first
              threshold: both present
              severity: BLOCKING
      output:
        type_classification: object
        structure_report: object
        security_report: object
        coverage_report: object
    - phase: 2
      name: Cross-Reference Validation
      description: Validate internal references and dependencies
      task_ref: validate-squad-cross-references
      executor: script
      duration: < 30 seconds
      blocking: true
      checks:
        - id: XREF-001
          name: Handoff targets exist
          severity: BLOCKING
        - id: XREF-002
          name: Task references valid
          severity: BLOCKING
        - id: XREF-003
          name: Template references valid
          severity: WARNING
        - id: XREF-004
          name: Checklist references valid
          severity: WARNING
        - id: XREF-005
          name: Data file references valid
          severity: WARNING
      gate:
        id: GATE-XREF
        name: Cross-Reference Gate
        type: automated
        severity: blocking
        pass_condition: no broken BLOCKING references
        fail_action: VETO (V6)
      output:
        xref_pass: count
        xref_fail: count
        broken_references: list
    - phase: 3
      name: Quality Assessment
      description: AI-powered quality evaluation
      task_ref: validate-squad-quality
      executor: ai
      duration: < 2 minutes
      blocking: false
      dimensions:
        - dimension: Prompt Quality
          weight: 0.25
          evaluator: ai
          criteria:
            - Explicit input/output examples
            - Anti-patterns documented
            - Measurable success criteria
            - Step-by-step instructions
            - No vague language
        - dimension: Pipeline Coherence
          weight: 0.25
          evaluator: ai
          criteria:
            - Output→Input chain valid
            - No sequence collisions
            - Checkpoints at critical points
            - Failure handling defined
            - Dependencies explicit
        - dimension: Checklist Actionability
          weight: 0.25
          evaluator: ai
          criteria:
            - Items measurable
            - Scoring system present
            - Pass/fail thresholds
            - Auto-correction guidance
            - Edge cases covered
        - dimension: Documentation
          weight: 0.25
          evaluator: ai
          criteria:
            - README explains purpose
            - Getting started guide
            - Command examples
            - Changelog maintained
      output:
        tier3_score: 0-10
        dimension_scores:
          prompt_quality: 0-10
          pipeline_coherence: 0-10
          checklist_actionability: 0-10
          documentation: 0-10
    - phase: 4
      name: Contextual Validation
      description: Type-specific validation based on detected squad type
      task_ref: validate-squad-contextual
      executor: ai
      duration: < 1 minute
      blocking: false
      conditional_checks:
        expert:
          - check: voice_dna in all agents
            required: true
          - check: objection_algorithms present
            required: true
          - check: output_examples (3+)
            required: true
          - check: tier_organization
            required: true
        pipeline:
          - check: workflow_definition
            required: true
          - check: phase_checkpoints
            required: true
          - check: orchestrator_completeness
            required: true
          - check: automation_script (if 8+ phases)
            required: conditional
        hybrid:
          - check: persona_profile
            required: true
          - check: behavioral_states
            required: true
          - check: heuristic_validation
            required: true
          - check: task_anatomy_8_fields
            required: true
      output:
        tier4_score: 0-10
        type_specific_checks: list
    - phase: 5
      name: Verdict (Veto Gates + Report)
      description: "Consolidated: veto check and final score calculation with report generation"
      task_ref: validate-squad-verdict
      executor: script
      duration: < 15 seconds
      blocking: true
      sub_steps:
        - step: veto-check
          veto_conditions:
            universal:
              - id: V1
                condition: No entry agent defined
              - id: V2
                condition: Entry agent cannot activate
              - id: V3
                condition: ">20% missing references"
              - id: V4
                condition: config.yaml invalid
              - id: V5
                condition: Security issue detected
              - id: V6
                condition: Critical cross-reference broken
            expert:
              - id: VE1
                condition: Zero agents with voice_dna
              - id: VE2
                condition: No Tier 0 diagnosis
            pipeline:
              - id: VP1
                condition: Sequence collisions
              - id: VP2
                condition: Broken output chain
              - id: VP3
                condition: No quality gate
            hybrid:
              - id: VH1
                condition: No heuristic validation
              - id: VH2
                condition: No fallback behavior
        - step: score-calculation-report
          calculation:
            formula: (tier3_score x 0.80) + (tier4_score x 0.20)
            adjustments:
              - Deduct 1.5 per blocking failure
              - Deduct 0.3 per warning
              - Clamp to 0-10 range
          thresholds:
            pass: 7
            conditional: 5
            fail: 5
          result_determination:
            - condition: veto_triggered == true
              result: FAIL
            - condition: score >= 7.0 AND blocking_issues == 0
              result: PASS
            - condition: score >= 5.0 AND blocking_issues == 0
              result: CONDITIONAL
            - condition: default
              result: FAIL
      output:
        veto_status: object
        final_score: 0-10
        result: PASS | CONDITIONAL | FAIL
        report_path: "{squad_path}/docs/validation-report-{date}.md"
  checkpoints:
    - checkpoint: After Phase 1 (Deterministic Checks)
      gates: [GATE-T1, GATE-SEC]
      action_on_fail: ABORT
      message: Deterministic checks failed (structure or security)
    - checkpoint: After Phase 2 (Cross-References)
      gate: GATE-XREF
      action_on_fail: ABORT
      message: Cross-reference validation failed
    - checkpoint: After Phase 5 (Verdict)
      gate: VETO-CHECK
      action_on_fail: FAIL
      message: Veto condition triggered
  failure_handling:
    on_blocking_failure:
      - Log failure with details
      - Generate partial report
      - Exit with code 1
    on_veto:
      - Log veto condition
      - Override any passing score
      - Generate report with veto explanation
      - Exit with code 1
    on_script_error:
      - Log error
      - Exit with code 2
  resume:
    state_file: .aiox/squad-runtime/validate-squad/{squad_name}/state.json
    supported: true
    preserve_outputs: true
    allowed_phases:
      - phase_1_deterministic_checks
      - phase_2_cross_reference
      - phase_3_quality_assessment
      - phase_4_contextual_validation
      - phase_5_verdict
  usage:
    cli:
      - command: ./scripts/validate-squad.sh {squad-name}
        description: Run deterministic checks
      - command: ./scripts/validate-squad.sh {squad-name} --verbose
        description: Verbose output
      - command: ./scripts/validate-squad.sh {squad-name} --json
        description: JSON output for CI/CD
    claude:
      - command: "*validate-squad {squad-name}"
        description: Full validation with AI assessment
      - command: "*validate-squad {squad-name} --type=expert"
        description: Force expert type validation
  integration:
    triggered_by:
      - task: qa-after-creation
        auto: true
      - task: create-squad
        auto: true
      - command: "*validate-squad"
        manual: true
    triggers:
      on_pass:
        - Mark squad as validated
        - Update .aiox/squad-runtime/ecosystem-registry.yaml
      on_fail:
        - Notify of issues
        - Offer fix-issues task
