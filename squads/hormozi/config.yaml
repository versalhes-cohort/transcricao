  minds_path: outputs/minds/alex_hormozi
  prompts_path: docs/projects/hormozi-squad/prompts
  artifacts_path: outputs/minds/alex_hormozi/artifacts

# Mental Models (8 confirmed)
mental_models:
  - id: MM_001
    name: "Value Equation"
    formula: "Value = (Dream Outcome x Likelihood) / (Time + Effort)"
    type: universal
    transferability: 0.95

  - id: MM_002
    name: "Grand Slam Offer"
    insight: "Offer so good people feel stupid saying no"
    type: domain
    transferability: 0.85

  - id: MM_003
    name: "Framework-First Reasoning"
    insight: "Convert all problems to systematic frameworks"
    type: universal
    transferability: 0.60

  - id: MM_004
    name: "External Metrics as Reality Anchor"
    insight: "If unmeasurable, doesn't exist"
    type: universal

  - id: MM_005
    name: "Core Four Lead Generation"
    insight: "Warm, Content, Cold, Paid"
    type: domain

  - id: MM_006
    name: "Rule of 100"
    insight: "Daily volume commitment"
    type: domain

  - id: MM_007
    name: "More, Better, New"
    insight: "Growth prioritization sequence"
    type: domain

  - id: MM_008
    name: "LTV:CAC 3:1"
    insight: "Unit economics benchmark"
    type: domain

# Workflows
workflows:
  - id: wf-grand-slam-offer
    name: "Grand Slam Offer Creation"
    version: "1.0.0"
    duration: "3-5 days"
    phases: 5
    description: "Create irresistible offers using Hormozi methodology"
    agents_involved:
      - hormozi-chief
      - hormozi-offers
      - hormozi-pricing
      - hormozi-copy
      - hormozi-audit
    source_frameworks:
      - "OFFER_CREATION_SYSTEM"
      - "VALUE_EQUATION_ENGINE"
    quality_score: "PASS"
    lines: 1135

