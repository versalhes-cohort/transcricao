# Hormozi Squad — The $100M Mind System v1.0
# One mind, multiple specialties. Methodology consistency with brutal depth.

pack:
  name: hormozi
  title: "Hormozi Squad — The $100M Mind System"
  version: "1.0.0"
  author: "AIOX Team"
  description: "15 specialized Alex Hormozi agents, each mastering one aspect of his methodology"
  icon: "💰"
  slash_prefix: "hormozi"
  entry_agent: hormozi-chief

metadata:
  version: "1.0.0"
  score: 10.0
  created: 2026-02-09
  source_mind: alex_hormozi
  fidelity_target: 0.90
  total_source_files: 165
  total_source_size_mb: 165
  mmos_artifacts: 70
  mental_models: 8

entry_agent: hormozi-chief

domain_model:
  Strategic:
    label: "Estratégico"
    scope: "Diagnóstico de mercado, arquitetura de oferta e decisões de crescimento"
  Tactical:
    label: "Tático"
    scope: "Desenho de campanhas, lead gen, pricing e sequencing"
  Operational:
    label: "Operacional"
    scope: "Produção de copy, scripts, assets e automações de entrega"

logging:
  runtime_audit: true
  error_behavior: fail_loud
  error_handling:
    on_validation_fail: block_publish
    on_handoff_fail: emit_recovery_handoff
    on_calculation_fail: preserve_partial_artifact

settings:
  activation:
    show_context_report: true
    show_preload_report: true
    show_quick_commands: true
    quick_commands_limit: 6
  preload:
    max_shared_files: 3
    max_product_files: 4

workspace_integration:
  level: none
  rationale: >-
    Hormozi depende de contexto canônico de produto, oferta, prova e pricing
    no workspace, mas não define seus próprios gates. O COO resolve readiness
    e o squad consome esse contrato antes de output final.
  read_paths:
    - workspace/_system/config.yaml
    - workspace/businesses/
  write_paths: []
  readiness_owner: workspace-chief
  readiness_resolver: squads/hormozi/scripts/resolve-readiness.cjs

# MMOS Integration
mmos_integration:
  enabled: true
  log_source: true
  fallback_behavior: "graceful"
  mind_mapping:
    hormozi-chief: alex_hormozi
    hormozi-offers: alex_hormozi
    hormozi-leads: alex_hormozi
    hormozi-models: alex_hormozi
    hormozi-hooks: alex_hormozi
    hormozi-ads: alex_hormozi
    hormozi-pricing: alex_hormozi
    hormozi-copy: alex_hormozi
    hormozi-launch: alex_hormozi
    hormozi-retention: alex_hormozi
    hormozi-advisor: alex_hormozi
    hormozi-audit: alex_hormozi
    hormozi-closer: alex_hormozi
    hormozi-scale: alex_hormozi
    hormozi-workshop: alex_hormozi
    hormozi-content: alex_hormozi

