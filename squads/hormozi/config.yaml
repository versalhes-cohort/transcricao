# Veto Conditions (Centralized)
veto_conditions:
  config_file: config/veto-conditions.yaml
  enforcement: strict
  tiers:
    tier_0_universal: 3   # Apply to ALL agents
    tier_1_workflow: 8    # Apply to wf-grand-slam-offer
    tier_2_agent_specific: 6  # Per-agent rules
    tier_3_handoff: 1     # Specialist-to-specialist
  handoff_template: templates/handoff-context-tmpl.yaml
  mandatory_checklists:
    antipattern: checklists/antipattern-screening.md
    market_validation: checklists/market-validation-veto.md
    golden_ratios: checklists/golden-ratios-veto.md

# Validation Scripts (Tools for Agents)
validation_scripts:
  mvn_validator:
    path: scripts/validate-mvn.py
    usage: "python squads/hormozi/scripts/validate-mvn.py --inline 'ticket:X,cac:X,...'"
    trigger: "Before any calculation involving price, ROI, LTV, CAC"
    returns: "PASS (exit 0) or FAIL (exit 1)"

  handoff_validator:
    path: scripts/validate-handoff.py
    usage: "python squads/hormozi/scripts/validate-handoff.py <file.yaml>"
    trigger: "Before any specialist-to-specialist handoff"
    returns: "PASS (exit 0) or FAIL (exit 1)"

  antipattern_validator:
    path: scripts/validate-antipattern.py
    usage: "python squads/hormozi/scripts/validate-antipattern.py --interactive"
    trigger: "Before approving offer for launch"
    returns: "PASS (exit 0) or VETO (exit 1)"

# Dependencies
dependencies:
  - aiox-core

tags:
  - hormozi
  - offers
  - leads
  - money-models
  - business-strategy
  - scaling
  - direct-response

process_token_contract:
  path: "data/token-registry.yaml"
  scope: "hormozi-core"
  tokens_declared: 14

composition_mapping:
  tokens:
    source: "data/token-registry.yaml"
    count: 14
    description: "Tokens de oferta, growth e governança da metodologia Hormozi"
  atoms:
    description: "Tasks unitárias de diagnóstico, criação, cálculo e execução"
    mapping:
      - pattern: "tasks/diagnose-*.md"
        role: diagnosis
      - pattern: "tasks/create-*.md"
        role: creation
      - pattern: "tasks/design-*.md"
        role: design
      - pattern: "tasks/calculate-*.md"
        role: calculation
      - pattern: "tasks/execute-*.md"
        role: execution
    count: 57
  molecules:
    description: "Padrões recorrentes compostos por múltiplos atoms"
    declared:
      - id: mol-offer-engineering
        atoms: [diagnose-value-equation, architect-offer-stack, create-grand-slam-offer, create-guarantee-stack, create-bonus-stack]
      - id: mol-launch-sequence
        atoms: [create-launch-timeline, create-launch-narrative, plan-launch-evento, setup-war-room, run-launch-post-mortem]
      - id: mol-money-model
        atoms: [design-money-model, design-subscription-model, calculate-30-day-profit, optimize-ltv-cac-ratio]
  organisms:
    description: "Workflows completos de aplicação da metodologia"
    mapping:
      - id: org-grand-slam-offer
        workflow: wf-grand-slam-offer
        molecules: [mol-offer-engineering]
        state_machine: true
        phases: 5
      - id: org-money-model-design
        workflow: wf-money-model-design
        molecules: [mol-money-model]
        state_machine: true
        phases: 4
      - id: org-full-launch-sequence
        workflow: wf-full-launch-sequence
        molecules: [mol-launch-sequence]
        state_machine: true
        phases: 6
  templates:
    description: "Templates de outputs Hormozi"
    source: "templates/"
  instances:
    description: "Execuções persistidas em outputs e artefatos de campanha"
    persistence: "outputs/sinkra-squad/hormozi/"
    lifecycle: [draft, validated, approved, delivered, archived]


