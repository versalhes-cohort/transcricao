    databases:
      - squads/hormozi/data/minds/hormozi-voice-dna.yaml
      - squads/hormozi/data/minds/hormozi-ads_dna.yaml
    checklists:
      - checklists/goated-ads-checklist.md
      - checklists/ad-angles-checklist.md
    handoff_to: [hormozi-leads, hormozi-audit]
    handoff_from: [hormozi-chief, hormozi-copy, hormozi-hooks]

  - id: hormozi-pricing
    role: "Pricing strategy, anchoring, raises"
    tier: 2
