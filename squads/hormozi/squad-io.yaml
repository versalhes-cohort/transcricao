# ============================================================
# CROSS-DOMAIN — Relações com outros squads e sistemas
# ============================================================

cross_domain:

  cross_squad:
    # Squads que CONSOMEM outputs do hormozi
    - squad: copy-squad
      relationship: consumer
      description: "Copy-squad pode consumir offer architecture e headlines do hormozi como input"
      shared_artifacts: [grand-slam-offer, hook-variations, sales-page-copy]

    - squad: brand
      relationship: consumer
      description: "Brand pode usar naming e positioning outputs do hormozi"
      shared_artifacts: [grand-slam-offer]

    - squad: acceleration-squad
      relationship: bidirectional
      description: "Acceleration fornece BMC/Lean Canvas; hormozi fornece offer engineering"
      hormozi_consumes: ["BMC outputs", "Lean Canvas"]
      hormozi_provides: [grand-slam-offer, money-model-architecture]

    - squad: media-buy-squad
      relationship: consumer
      description: "Media-buy consome ad scripts e hook variations do hormozi"
      shared_artifacts: [ad-scripts, ad-variations, hook-variations]

    - squad: traffic-masters
      relationship: consumer
      description: "Traffic masters consome ad creatives e lead strategies"
      shared_artifacts: [ad-scripts, core-four-strategy]

    - squad: storytelling-squad
      relationship: consumer
      description: "Storytelling pode usar proof stacks e case studies"
      shared_artifacts: [value-equation-diagnostic]

  # Sem dependências diretas de apps/infra
  apps: []
  infrastructure: []
  packages: []

# ============================================================
# ENFORCEMENT — Gap-zero e gates
# ============================================================

enforcement:

  required_inputs:
    - doc_id: L1-001
      min_state: POPULATED
      rationale: "Offerbook é o input primário — sem ele, oferta é no escuro"

    - doc_id: L1-002
      min_state: POPULATED
      rationale: "ICP define o avatar — sem ICP, comunicação é genérica"

  # O hormozi usa veto_conditions.yaml como enforcement principal
  # (18 gates), não task_gates como os outros squads
  enforcement_model: veto_conditions
  veto_config: squads/hormozi/config/veto-conditions.yaml

  # Validação adicional: workspace docs recomendados mas não bloqueantes
  recommended_inputs:
    - doc_id: L0-001
      min_state: POPULATED
      rationale: "Company DNA melhora contexto mas não bloqueia execução"

    - doc_id: L0-002
      min_state: DRAFT
      rationale: "Founder DNA para proof stacks — útil mas não obrigatório"

    - doc_id: L1-005
      min_state: POPULATED
      rationale: "Pricing strategy existente para calibração"

    - doc_id: L2-001
      min_state: DRAFT
      rationale: "Brand guidelines para consistência de voz"

    - doc_id: L2-002
      min_state: DRAFT
      rationale: "Positioning para diferenciação"

# ============================================================
# HANDOFF MATRIX — Fluxo entre agents
# ============================================================

handoff_matrix:
  template: squads/hormozi/templates/handoff-context-tmpl.yaml
  mandatory_fields: [source_agent, target_agent, mvn_status, current_phase, key_decisions, blockers]

  primary_flows:
    - name: "Offer → Monetization"
      from: hormozi-offers
      to: hormozi-models
      context: "Offer architecture + value stack + pricing anchor"

    - name: "Offer → Sales Copy"
      from: hormozi-offers
      to: hormozi-copy
      context: "Complete offer + dream outcome + guarantee + naming"

    - name: "Offer → Audit"
      from: hormozi-offers
      to: hormozi-audit
      context: "Offer for antipattern screening before launch"

    - name: "Copy → Launch"
      from: hormozi-copy
      to: hormozi-launch
      context: "Email sequences + sales page copy + registration page"

    - name: "Closer → Retention"
      from: hormozi-closer
      to: hormozi-retention
      context: "Post-sale customer data + contract details"

    - name: "Retention → Models"
      from: hormozi-retention
      to: hormozi-models
      context: "LTV data + churn metrics for model recalibration"

    - name: "Models → Scale"
      from: hormozi-models
      to: hormozi-scale
      context: "Unit economics + LTGP:CAC + capacity constraints"

# ============================================================
# AUDIT NOTES — Achados da auditoria CSO
# ============================================================

audit_notes:
  audited_by: CSO
  audited_at: "2026-03-09"
  squad_io_version: "2.0.0"
  previous_version: null  # Primeiro squad-io.yaml para hormozi

  findings:
    - id: HZ-001
      severity: INFO
      finding: "Squad não tem task files separados — tasks são comandos dentro dos agents"
      impact: "Padrão diferente dos outros squads (c-level, brand)"
      recommendation: "Documentar como variação aceita do schema v2"

    - id: HZ-002
      severity: INFO
      finding: "Squad não escreve no document-registry — é puramente de execução"
      impact: "Outputs não são rastreados no governance cycle"
      recommendation: "Considerar criar doc-registry entries para artifacts mais importantes (grand-slam-offer, money-model)"

    - id: HZ-003
      severity: LOW
      finding: "3 validation scripts referenciados (validate-mvn.py, validate-antipattern.py, validate-handoff.py) — existência não verificada"
      impact: "Se scripts não existem, enforcement é apenas conceptual"
      recommendation: "Verificar existência dos scripts e implementar se necessário"

    - id: HZ-004
      severity: LOW
      finding: "handoff-context-tmpl.yaml referenciado em templates/ — existência não verificada"
      impact: "VT3-001 (handoff context required) depende deste template"
      recommendation: "Verificar e criar template se não existe"

    - id: HZ-005
      severity: MEDIUM
      finding: "43 checklists existem nos paths esperados mas não foram validados individualmente"
      impact: "Checklists podem estar vazios ou incompletos"
      recommendation: "Rodar validação de conteúdo dos checklists prioritários (antipattern, market-validation, golden-ratios)"

    - id: HZ-006
      severity: LOW
      finding: "MMOS integration habilitada (mmos_integration.enabled: true) — source mind path referencia outputs/minds/alex_hormozi que pode não existir neste repo"
      impact: "Agents podem falhar ao carregar MMOS artifacts"
      recommendation: "Verificar se path outputs/minds/alex_hormozi existe ou atualizar para path correto"

    - id: HZ-007
      severity: INFO
      finding: "Cross-squad relationships identificadas com 6 squads (copy-squad, brand, acceleration, media-buy, traffic-masters, storytelling) — nenhuma formalizada com squad-io"
      impact: "Handoffs cross-squad são informais"
      recommendation: "Quando esses squads receberem squad-io.yaml v2, formalizar as bridges"

# ============================================================
# SCHEMA REFERENCE (v2.0)
# ============================================================
# squad-io.yaml v2.0 — Formal I/O contract schema
#
# SECTIONS:
#   inputs.workspace[]   — doc_id, path, min_state, usage, consumed_by_agents
#   inputs.squad_data    — shared databases, agent-specific DNA
#   inputs.config        — enforcement configs, templates
#   outputs.workspace[]  — docs escritos no workspace canônico (vazio para squads de execução)
#   outputs.artifacts[]  — artifacts produzidos pelo squad
#   agents[]             — id, role, tier, commands, databases, checklists, veto_gates, handoffs
#   workflows[]          — workflows formais com phases e gates
#   validation_scripts[] — scripts de enforcement automatizado
#   veto_conditions      — referência ao config centralizado
#   checklists           — inventário completo de checklists
#   cross_domain         — cross_squad, apps, infrastructure, packages
#   enforcement          — required_inputs, recommended_inputs, enforcement_model
#   handoff_matrix       — template, mandatory_fields, primary_flows
#   audit_notes          — findings da auditoria CSO
# ============================================================
