    checklists:
      - checklists/pricing-checklist.md
      - checklists/pricing-framework-checklist.md
      - checklists/price-raise-checklist.md
    veto_gates: [VT0-001, VT0-002, VT0-003, VT2-PRI-001, VT2-PRI-002]
    handoff_to: [hormozi-copy, hormozi-closer, hormozi-scale]
    handoff_from: [hormozi-models, hormozi-offers]

