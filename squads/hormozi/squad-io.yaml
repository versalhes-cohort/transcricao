# ============================================================
# squad-io.yaml — hormozi squad
# Version: 2.0.0
# Generated: 2026-03-09
# Author: CSO (Chief Sinkra Officer)
# ============================================================
#
# Contract I/O formal do hormozi-squad.
# Diferente dos squads c-level e brand, o hormozi é um squad de
# EXECUÇÃO — consome docs do workspace como contexto mas NÃO
# escreve de volta ao document-registry. Seus outputs são
# artifacts de campanha (ofertas, copies, scripts, audits).
#
# Arquitetura: 16 agents (4 tiers), 0 task files separados
# (tasks = comandos embutidos nos agents), 43 checklists,
# 18 veto conditions, 3 validation scripts, 1 workflow formal.
# ============================================================

squad: hormozi
version: "2.0.0"
schema: squad-io-v2
entry_agent: hormozi-chief
source_mind: alex_hormozi

# ============================================================
# INPUTS — Workspace docs consumed as context
# ============================================================
# O hormozi lê docs do workspace para contexto de negócio,
# ICP, pricing e brand — mas NÃO os modifica.
# ============================================================

inputs:

  workspace:
    # L0 - Identity (contexto de negócio e credibilidade)
    - path: workspace/{spoke}/L0-identity/company-dna.yaml
      doc_id: L0-001
      min_state: POPULATED
      usage: reference
      consumed_by_agents: [hormozi-chief, hormozi-offers, hormozi-advisor, hormozi-audit]
      rationale: "Entender DNA do negócio para contextualizar oferta"

    - path: workspace/{spoke}/L0-identity/founder-dna.yaml
      doc_id: L0-002
      min_state: POPULATED
      usage: reference
      consumed_by_agents: [hormozi-offers, hormozi-copy, hormozi-advisor]
      rationale: "Credenciais do fundador para proof stack e authority"

    # L1 - Strategy (inputs críticos para engenharia de ofertas)
    - path: workspace/{spoke}/L1-strategy/offerbook.yaml
      doc_id: L1-001
      min_state: POPULATED
      usage: reference
      consumed_by_agents: [hormozi-chief, hormozi-offers, hormozi-models, hormozi-pricing, hormozi-audit]
      rationale: "Offerbook é o input primário — ofertas existentes, tickets, bundles"

    - path: workspace/{spoke}/L1-strategy/icp.yaml
      doc_id: L1-002
      min_state: POPULATED
      usage: reference
      consumed_by_agents: [hormozi-chief, hormozi-offers, hormozi-leads, hormozi-copy, hormozi-hooks, hormozi-ads, hormozi-content]
      rationale: "ICP define avatar, dores, desejos — base de toda comunicação"

    - path: workspace/{spoke}/L1-strategy/pricing-strategy.yaml
      doc_id: L1-005
      min_state: POPULATED
      usage: reference
      consumed_by_agents: [hormozi-pricing, hormozi-models, hormozi-offers]
      rationale: "Estratégia de pricing existente para calibrar recomendações"

    # L2 - Tactical (brand context para comunicação)
    - path: workspace/{spoke}/L2-tactical/brand/brand-platform.yaml
      doc_id: L2-001
      min_state: DRAFT
      usage: reference
      consumed_by_agents: [hormozi-copy, hormozi-content, hormozi-hooks, hormozi-ads]
      rationale: "Tom de voz e brand guidelines para consistência de copy"

    - path: workspace/{spoke}/L2-tactical/brand/positioning.yaml
      doc_id: L2-002
      min_state: DRAFT
      usage: reference
      consumed_by_agents: [hormozi-offers, hormozi-copy, hormozi-advisor]
      rationale: "Posicionamento de mercado para diferenciação de oferta"

  # Databases internas do squad (READ-ONLY por todos os agents)
  squad_data:
    shared:
      - path: squads/hormozi/data/minds/hormozi-voice-dna.yaml
        usage: database
        consumed_by_agents: ALL
        description: "Voice DNA compartilhado — identidade Alex Hormozi"

      - path: squads/hormozi/data/minds/hormozi-thinking-dna.yaml
        usage: database
        consumed_by_agents: [hormozi-chief, hormozi-audit, hormozi-advisor]
        description: "Thinking DNA — frameworks de decisão e diagnóstico"

      - path: squads/hormozi/data/hormozi-case-library.yaml
        usage: database
        consumed_by_agents: [hormozi-chief, hormozi-offers, hormozi-leads, hormozi-models, hormozi-pricing, hormozi-audit, hormozi-advisor]
        description: "8 case studies com Value Equation — proof e evidência"

      - path: squads/hormozi/data/antipatterns-database.yaml
        usage: database
        consumed_by_agents: [hormozi-audit, hormozi-offers]
        description: "Catálogo de antipatterns de oferta/pricing/copy"

    # DNA especializado por agente (cada agent lê apenas o seu)
    agent_dna:
      - path: squads/hormozi/data/minds/hormozi-offers_dna.yaml
        agent: hormozi-offers
      - path: squads/hormozi/data/minds/hormozi-leads_dna.yaml
        agent: hormozi-leads
      - path: squads/hormozi/data/minds/hormozi-models_dna.yaml
        agent: hormozi-models
      - path: squads/hormozi/data/minds/hormozi-hooks_dna.yaml
        agent: hormozi-hooks
      - path: squads/hormozi/data/minds/hormozi-ads_dna.yaml
        agent: hormozi-ads
      - path: squads/hormozi/data/minds/hormozi-pricing_dna.yaml
        agent: hormozi-pricing
      - path: squads/hormozi/data/minds/hormozi-copy_dna.yaml
        agent: hormozi-copy
      - path: squads/hormozi/data/minds/hormozi-launch_dna.yaml
        agent: hormozi-launch
      - path: squads/hormozi/data/minds/hormozi-retention_dna.yaml
        agent: hormozi-retention
      - path: squads/hormozi/data/minds/hormozi-advisor_dna.yaml
        agent: hormozi-advisor
      - path: squads/hormozi/data/minds/hormozi-audit_dna.yaml
        agent: hormozi-audit
      - path: squads/hormozi/data/minds/hormozi-closer_dna.yaml
        agent: hormozi-closer
      - path: squads/hormozi/data/minds/hormozi-scale_dna.yaml
        agent: hormozi-scale
      - path: squads/hormozi/data/minds/hormozi-workshop_dna.yaml
        agent: hormozi-workshop
      - path: squads/hormozi/data/minds/hormozi-content_dna.yaml
        agent: hormozi-content

  # Validation configs (lidos por validation scripts)
  config:
    - path: squads/hormozi/config/veto-conditions.yaml
      usage: enforcement
      description: "18 veto conditions centralizadas (4 tiers)"

    - path: squads/hormozi/templates/handoff-context-tmpl.yaml
      usage: template
      description: "Template obrigatório para handoff entre agents (VT3-001)"

# ============================================================
# OUTPUTS — Artifacts produzidos (NÃO registry-tracked)
# ============================================================
# O hormozi squad NÃO escreve no document-registry.
# Seus outputs são artifacts de campanha entregues ao usuário
# ou consumidos por outros squads (copy-squad, brand, etc.)
# ============================================================

artifacts_produced:
  - offer-analysis
  - grand-slam-offer
  - money-model-architecture

outputs:

  # Nenhum output vai para o workspace canônico
  workspace: []

  # Artifacts produzidos por domínio
  artifacts:
    # Offer Engineering (hormozi-offers)
    - id: grand-slam-offer
      description: "Grand Slam Offer completa (value stack, naming, pricing, guarantee)"
      produced_by_agents: [hormozi-offers]
      format: structured_text
      contains: [dream_outcome, value_stack, guarantee, scarcity, urgency, naming_magico]

    - id: value-equation-diagnostic
      description: "Diagnóstico Value Equation (4 variáveis scored)"
      produced_by_agents: [hormozi-offers, hormozi-audit]
      format: structured_text

    - id: mvn-data-sheet
      description: "Minimum Viable Numbers coletados (7 core + vertical)"
      produced_by_agents: [hormozi-offers, hormozi-models]
      format: structured_data

    # Money Models (hormozi-models)
    - id: money-model-architecture
      description: "Arquitetura de monetização (upsells, downsells, continuity)"
      produced_by_agents: [hormozi-models]
      format: structured_text

    - id: ltgp-cac-analysis
      description: "Análise LTGP:CAC com base do cálculo"
      produced_by_agents: [hormozi-models, hormozi-retention]
      format: structured_data

    # Lead Generation (hormozi-leads)
    - id: core-four-strategy
      description: "Estratégia Core Four (warm, content, cold, paid)"
      produced_by_agents: [hormozi-leads]
      format: structured_text

    - id: lead-magnet-spec
      description: "Especificação de lead magnet"
      produced_by_agents: [hormozi-leads]
      format: structured_text

    # Sales Copy (hormozi-copy)
    - id: sales-page-copy
      description: "Copy completa de sales page (30+ seções)"
      produced_by_agents: [hormozi-copy]
      format: long_form_text

    - id: vsl-script
      description: "Script de Video Sales Letter"
      produced_by_agents: [hormozi-copy]
      format: long_form_text

    - id: landing-page-copy
      description: "Copy de landing page (hook-to-CTA)"
      produced_by_agents: [hormozi-copy]
      format: structured_text

    - id: email-sequences
      description: "Sequências de email (launch, nurture, winback)"
      produced_by_agents: [hormozi-copy, hormozi-launch]
      format: structured_text

    # Hooks & Ads (hormozi-hooks, hormozi-ads)
    - id: hook-variations
      description: "10+ variações de hook por campanha"
      produced_by_agents: [hormozi-hooks]
      format: list

    - id: ad-scripts
      description: "Scripts de anúncio (video + static)"
      produced_by_agents: [hormozi-ads]
      format: structured_text

    - id: ad-variations
      description: "10+ variações de ad creative"
      produced_by_agents: [hormozi-ads]
      format: list

    # Pricing (hormozi-pricing)
    - id: pricing-recommendation
      description: "Recomendação de preço com value anchor e base do cálculo"
      produced_by_agents: [hormozi-pricing]
      format: structured_data

    - id: price-raise-strategy
      description: "Estratégia de aumento de preço"
      produced_by_agents: [hormozi-pricing]
      format: structured_text

    # Launch (hormozi-launch)
    - id: launch-blueprint
      description: "Blueprint completo de lançamento (timeline, emails, cart strategy)"
      produced_by_agents: [hormozi-launch]
      format: structured_text

    - id: war-room-playbook
      description: "Playbook de war room (contingências, escalação)"
      produced_by_agents: [hormozi-launch]
      format: structured_text

    # Sales (hormozi-closer)
    - id: sales-scripts
      description: "Scripts de venda word-for-word (CLOSER framework)"
      produced_by_agents: [hormozi-closer]
      format: long_form_text

    - id: objection-handling
      description: "Respostas por tipo de objeção"
      produced_by_agents: [hormozi-closer]
      format: structured_text

    # Retention (hormozi-retention)
    - id: retention-strategy
      description: "Estratégia de retenção (churn diagnosis, onboarding, win-back)"
      produced_by_agents: [hormozi-retention]
      format: structured_text

    - id: onboarding-30-day
      description: "Sequência de onboarding 30 dias"
      produced_by_agents: [hormozi-retention]
      format: structured_text

    # Scale (hormozi-scale)
    - id: scaling-roadmap
      description: "Roadmap de 9 estágios de crescimento"
      produced_by_agents: [hormozi-scale]
      format: structured_text

    - id: bottleneck-diagnostic
      description: "Diagnóstico de gargalos e constrangimentos"
      produced_by_agents: [hormozi-scale]
      format: structured_text

    # Content (hormozi-content)
    - id: content-strategy
      description: "Estratégia de conteúdo por plataforma"
      produced_by_agents: [hormozi-content]
      format: structured_text

    - id: content-calendar
      description: "Calendário de conteúdo (30/90/365 dias)"
      produced_by_agents: [hormozi-content]
      format: structured_text

    # Workshop (hormozi-workshop)
    - id: workshop-blueprint
      description: "Blueprint de workshop (3-4h, live selling)"
      produced_by_agents: [hormozi-workshop]
      format: structured_text

    # Audit (hormozi-audit)
    - id: audit-report
      description: "Relatório de auditoria (offer, LP, sales, retention)"
      produced_by_agents: [hormozi-audit]
      format: structured_text

    - id: antipattern-screening-result
      description: "Resultado de screening de antipatterns (PASS/VETO)"
      produced_by_agents: [hormozi-audit]
      format: structured_data

    # Advisor (hormozi-advisor)
    - id: strategic-recommendation
      description: "Recomendação estratégica de alto nível"
      produced_by_agents: [hormozi-advisor]
      format: structured_text

# ============================================================
# AGENTS — 16 agents, 4 tiers
# ============================================================

agents:
  - id: hormozi-chief
    role: "Master Orchestrator — routing, strategy, coordination"
    is_lead: true
    tier: 0
    commands: [route, diagnose]
    databases:
      - squads/hormozi/data/minds/hormozi-voice-dna.yaml
      - squads/hormozi/data/minds/hormozi-thinking-dna.yaml
      - squads/hormozi/data/hormozi-case-library.yaml
    reads_at_runtime:
      - squads/hormozi/config/veto-conditions.yaml
    checklists:
      - checklists/antipattern-screening.md
      - checklists/golden-ratios-veto.md
      - checklists/market-validation-veto.md

  - id: hormozi-offers
    role: "Grand Slam Offers, Value Equation, offer engineering"
    tier: 1
    commands: ["*offer", "*value-equation", "*grand-slam", "*dream-outcome", "*value-stack", "*naming", "*mvn-check", "*scarcity", "*urgency", "*bonuses", "*guarantees", "*headline-mode", "*diagnose"]
    databases:
      - squads/hormozi/data/minds/hormozi-voice-dna.yaml
      - squads/hormozi/data/minds/hormozi-offers_dna.yaml
      - squads/hormozi/data/hormozi-case-library.yaml
    reads_at_runtime:
      - squads/hormozi/data/antipatterns-database.yaml
    checklists:
      - checklists/value-equation-checklist.md
      - checklists/guarantees-checklist.md
      - checklists/naming-framework-checklist.md
      - checklists/bonuses-checklist.md
      - checklists/scarcity-urgency-checklist.md
      - checklists/offer-architecture-checklist.md
    veto_gates: [VT0-001, VT0-002, VT0-003, VT1-001, VT1-002, VT1-003, VT1-004, VT1-005, VT1-006, VT1-007, VT1-008, VT2-OFF-001, VT2-OFF-002]
    handoff_to: [hormozi-models, hormozi-copy, hormozi-audit, hormozi-pricing]
    handoff_from: [hormozi-chief, hormozi-leads]

  - id: hormozi-leads
    role: "Core Four, lead magnets, content strategy"
    tier: 1
    commands: ["*core-four", "*lead-magnet", "*warm-outreach", "*cold-outreach", "*content-strategy", "*paid-ads", "*rule-of-100", "*lead-audit", "*channel-mix"]
    databases:
      - squads/hormozi/data/minds/hormozi-voice-dna.yaml
      - squads/hormozi/data/minds/hormozi-leads_dna.yaml
      - squads/hormozi/data/hormozi-case-library.yaml
    checklists:
      - checklists/core-four-checklist.md
      - checklists/lead-magnet-checklist.md
      - checklists/marketing-machine-checklist.md
      - checklists/fast-cash-checklist.md
    handoff_to: [hormozi-models, hormozi-pricing, hormozi-scale, hormozi-audit]
    handoff_from: [hormozi-chief, hormozi-ads, hormozi-content]

  - id: hormozi-models
    role: "Money Models, upsells, downsells, continuity"
    tier: 1
    commands: ["*money-model", "*health-check", "*die-framework", "*cash-first", "*upsell", "*downsell", "*continuity", "*payment-plan", "*decoy", "*attraction", "*win-back", "*giveaway", "*buy-x-get-y", "*pay-less-now"]
    databases:
      - squads/hormozi/data/minds/hormozi-voice-dna.yaml
      - squads/hormozi/data/minds/hormozi-models_dna.yaml
      - squads/hormozi/data/hormozi-case-library.yaml
    checklists:
      - checklists/money-model-checklist.md
      - checklists/upsell-strategy-checklist.md
      - checklists/upsell-sequence-checklist.md
      - checklists/downsell-strategy-checklist.md
      - checklists/subscription-model-checklist.md
    veto_gates: [VT0-001, VT0-002, VT0-003, VT2-PRI-001, VT2-PRI-002]
    handoff_to: [hormozi-pricing, hormozi-scale, hormozi-copy, hormozi-offers]
    handoff_from: [hormozi-leads, hormozi-offers, hormozi-retention]

  - id: hormozi-advisor
    role: "Strategic counsel, Q&A, philosophy"
    tier: 1
    commands: ["*advisor", "*philosophy", "*qa", "*brand-audit", "*model-selection", "*positioning", "*exit-planning", "*portfolio-strategy"]
    databases:
      - squads/hormozi/data/minds/hormozi-voice-dna.yaml
      - squads/hormozi/data/minds/hormozi-thinking-dna.yaml
      - squads/hormozi/data/minds/hormozi-advisor_dna.yaml
