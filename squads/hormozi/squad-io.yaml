    role: "Offer/LP audits, diagnostics, antipattern screening"
    tier: 2
    commands: ["*audit", "*diagnose"]
    databases:
      - squads/hormozi/data/minds/hormozi-voice-dna.yaml
      - squads/hormozi/data/minds/hormozi-thinking-dna.yaml
      - squads/hormozi/data/minds/hormozi-audit_dna.yaml
