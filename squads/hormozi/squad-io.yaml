    handoff_from: [hormozi-offers, hormozi-chief]

# ============================================================
# WORKFLOW — Grand Slam Offer Creation (único workflow formal)
# ============================================================

workflows:
  - id: wf-grand-slam-offer
    name: "Grand Slam Offer Creation"
    duration: "3-5 days"
    phases: 5
    agents_involved: [hormozi-chief, hormozi-offers, hormozi-pricing, hormozi-copy, hormozi-audit]
    flow: |
      Phase 0: MVN Discovery Sprint (hormozi-offers)
        → Coleta 7 MVN_CORE + vertical-specific
        → GATE: VT1-001 (7/7 items) + VT1-002 (market >=7/10)

      Phase 1: Dream Outcome + Problem Mapping (hormozi-offers)
        → Dream Outcome com STATUS component
        → Problem-Solution Matrix
        → GATE: VT1-003 (status) + VT1-004 (leverage point)

      Phase 2: Offer Architecture (hormozi-offers + hormozi-pricing)
        → Value Stack (5+ components)
        → Pricing com anchor (stack >= 3x price)
        → Guarantee design
        → Scarcity/Urgency (genuine only)
        → GATE: VT1-005 (5+ components) + VT1-006 (3x anchor)

      Phase 3: Naming + Packaging (hormozi-offers)
        → MAGICO formula (5/6 components)
        → GATE: VT1-007 (MAGICO check)

      Phase 4: Audit + Launch Prep (hormozi-audit → hormozi-copy)
        → Antipattern screening
        → GATE: VT1-008 (antipattern PASS)
        → Handoff to hormozi-copy for sales page/VSL

# ============================================================
# VALIDATION SCRIPTS — Enforcement automatizado
# ============================================================

validation_scripts:
  - id: validate-mvn
    path: squads/hormozi/scripts/validate-mvn.py
    trigger: "Before any calculation involving price, ROI, LTV, CAC"
    enforces: [VT0-001, VT1-001, VT2-OFF-001]
    returns: "PASS (exit 0) or FAIL (exit 1)"

  - id: validate-antipattern
    path: squads/hormozi/scripts/validate-antipattern.py
    trigger: "Before approving offer for launch"
    enforces: [VT1-008, VT2-AUD-001]
    returns: "PASS (exit 0) or VETO (exit 1)"

  - id: validate-handoff
    path: squads/hormozi/scripts/validate-handoff.py
    trigger: "Before any specialist-to-specialist handoff"
    enforces: [VT3-001]
    returns: "PASS (exit 0) or FAIL (exit 1)"

# ============================================================
# VETO CONDITIONS — 18 gates, 4 tiers (referência)
# ============================================================

veto_conditions:
  source: squads/hormozi/config/veto-conditions.yaml
  summary:
    tier_0_universal: 3     # VT0-001 (no MVN=no calc), VT0-002 (no fake scarcity), VT0-003 (no numbers without base)
    tier_1_workflow: 8      # VT1-001 to VT1-008 (Grand Slam Offer phases)
    tier_2_agent_specific: 6 # VT2-OFF-001/002, VT2-PRI-001/002, VT2-HOO-001, VT2-AUD-001
    tier_3_handoff: 1       # VT3-001 (handoff context required)
    total: 18

