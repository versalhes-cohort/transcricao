    handoff_from: [all]

  - id: hormozi-scale
    role: "Scaling strategy, 9-stage roadmap"
    tier: 3
    commands: ["*scale", "*growth", "*constraint"]
    databases:
      - squads/hormozi/data/minds/hormozi-voice-dna.yaml
      - squads/hormozi/data/minds/hormozi-scale_dna.yaml
    handoff_to: [hormozi-models, hormozi-leads]
    handoff_from: [hormozi-models, hormozi-leads, hormozi-chief]

  - id: hormozi-content
    role: "Content strategy, creation"
    tier: 2
    commands: ["*content", "*platform", "*audience", "*repurpose", "*calendar", "*thumbnail", "*headline", "*newsletter", "*podcast"]
    databases:
      - squads/hormozi/data/minds/hormozi-voice-dna.yaml
      - squads/hormozi/data/minds/hormozi-content_dna.yaml
    checklists:
