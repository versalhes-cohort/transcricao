# =============================================================================
# KEY INSIGHTS
# =============================================================================
key_insights:
  - insight: "O Hook e 80% do Valor do Marketing"
    detail: "David Ogilvy: depois de escrever o headline, voce gastou 80 centavos do seu dolar"
    action: "Inverta seu tempo - 80% hook, 20% resto"

  - insight: "Grave 10 Hooks Para Cada 1 Ad"
    detail: "Nao e typo - 10 para 1. Encontra o winner 10x mais rapido"
    action: "Pare de gravar 1 e torcer"

  - insight: "Hooks Devem Fazer ELES Se Sentirem Importantes"
    detail: "Dean mudou de ego para empatia e fez milhoes"
    action: "Delete referencias a voce do hook"

  - insight: "Let The Data Do The Teaching"
    detail: "Mesmo seu pior conteudo tem top 10% - analise esses hooks"
    action: "Documente TUDO, analise top/bottom 10%"

  - insight: "Cocktail Party Effect"
    detail: "Seu nome corta qualquer ruido - replique isso"
    action: "Seja especifico no call-out"

  - insight: "Hooks Sao Verbal + Nonverbal"
    detail: "Nao e so texto - e tudo nos primeiros 5 segundos"
    action: "Use visual absurdo + explicacao"

  - insight: "Mude Apenas o Hook e 2-5-10X Resultados"
    detail: "Mesmo produto, preco, oferta - so hook diferente"
    action: "Teste hooks antes de mudar qualquer outra coisa"

