# =============================================================================
# HACKS E ATALHOS
# =============================================================================
hacks:
  - name: "O Reverso do Ego"
    technique: "Pergunte 'qual a maior dor/desejo deles' em vez de 'como me apresento bem'"

  - name: "Bottom Leaderboard"
    technique: "Use o PIOR caso de sucesso como hook - remove todas objecoes"

  - name: "The Banana Principle"
    technique: "Visual absurdo + explicacao = atencao garantida"
    template: "You might be wondering why I just [acao bizarra]"

  - name: "Confession Hook"
    technique: "'I have a confession...' funciona porque humanos sao curiosos sobre segredos"

  - name: "The Guarantee Hook"
    technique: "'I f&cking guarantee you...' - intensidade emocional + certeza"

  - name: "Question Stack"
    technique: "3 perguntas sim em sequencia = 90% concordancia na quarta afirmacao"

  - name: "Pattern Interrupt Visual"
    technique: "Comece com algo que NAO faz sentido, depois explique"

  - name: "Specific Number Hook"
    technique: "'$4,664/month' funciona melhor que '$5k/month'"

  - name: "Call Out Multiplo"
    technique: "'Local business owners' > 'Chiropractors in Texas' > 'Austin chiropractors with 2-5 years experience'"

  - name: "The Rumor Hook"
    technique: "'The rumors are true...' - cria FOMO instantaneo"

