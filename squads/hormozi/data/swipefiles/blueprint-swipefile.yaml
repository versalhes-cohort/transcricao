      type: "email"
      trigger: "Immediately post registration"
      subject: "You're registered. (Save this email)"
      sms: "Hey {Name}, it's Alex Hormozi - you'll get 6 more launch texts: 3 reminders + 3 goodies. Check email for details. Reply 'Stop' to stop."
      key_elements:
        - "PLEASE SAVE THIS EMAIL. IT HAS IMPORTANT BOOK LAUNCH DETAILS."
        - "We have A LOT OF PEOPLE registered already. Our goal is to pass 1,000,000+ registrations by launch day."
        - "I will stream it on Youtube Live. No fancy tech."
        - "PS - If you pre-ordered, products ship first the moment event wraps up"
        - "PPS - We'll select 10 people who pre-ordered to come spend a day with me in Vegas"

    - id: "reg_missed_this"
      type: "email"
      trigger: "15 min after registration"
      subject: "in case you missed this"
      target: "Registered but not purchased"
      vip_benefits:
        - "Automatic entry to win a day with me in Vegas (you and 9 others)"
        - "Your $100M Money Models book first & guaranteed first printing"
        - "A private VIP livestream 'Backstage Pass' with chat enabled"
        - "$100M LAUNCH Workshop - revealing my proven launch process"
      ps: "I'm giving something huge away for free to everyone live at the launch... it's better than a NFT but less than a Bitcoin... but you gotta be there live to get it."

    - id: "reg_get_book_first"
      type: "email"
      trigger: "24 hours after registration"
      subject: "Get your book first + VIP Livestream"
      key_persuasion:
        - "People who wait to get their copy at the event will pay the same price but don't get any of the VIP Benefits"
        - "This means you get all the VIP bonuses for free if you simply pre-order the book for the same price"

    - id: "reg_affiliate_invite"
