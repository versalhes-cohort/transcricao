# Blueprint $100M Money Models - Complete Swipefile
# Source: Alex Hormozi - $100M Money Models Launch Campaign
# Extracted: 2026-02-24

version: "1.0"
source: "Blueprint $100M Money Models"
description: "Complete collection of ad angles, email sequences, SMS templates, landing page copy, and VSL scripts from the $100M Money Models book launch campaign"

# =============================================================================
# AD ANGLES - BUSINESS GROWTH
# =============================================================================
ad_angles:
  business_growth:
    # Core hooks for business growth ads
    - id: "bg_rumors_true_big_companies"
      hook: "The rumors are true..."
      angle: "Big companies DO have an unfair advantage - they think about customers differently"
      key_contrast:
        small_business: "How do I get someone to buy my thing?"
        big_business: "How do I get someone to keep buying my things?"
      example:
        small: "Sell $500 course, hope customer is happy, maybe they buy again someday"
        big: "Give away $500 course for free, sell $200/month implementation, upsell $5,000 done-for-you, keep helping them scale"
      result: "Same customer. More value. 10x more revenue."
      cta: "Grab your free ticket here"
      ps_elements:
        - "Preorder a book on the way in and you'll get instantly upgraded to VIP and get 4 amazing free bonuses"
        - "Expect fireworks"

    - id: "bg_rumors_true_rich_broke"
      hook: "The rumors are true..."
      angle: "Rich business owners ARE different - they make money from customers, not from sales"
      key_insight: "Rich approach: Sell once, then sell again, then sell again"
      analogy: "It's like the difference between digging for gold with a spoon vs. using heavy machinery"

    - id: "bg_rumors_true_overnight"
      hook: "The rumors are true..."
      angle: "Overnight success = cracked the code on customer economics"
      math:
        overnight: "$3-5 from every $1 spent on advertising"
        everyone_else: "$1.20 from every $1 spent (or loses money)"
      analogy: "Money printing machine vs. piggy bank"

    - id: "bg_rumors_true_million_dollar"
      hook: "The rumors are true..."
      angle: "Million-dollar secret is a way of thinking"
      contrast:
        transaction: "How do I get someone to buy something?"
        relationship: "How do I help someone solve their whole problem?"
      example:
        transaction: "Sell $2,000 website and move on"
        relationship: "$2,000 website + $500/month hosting + $1,000/month marketing + $300/month maintenance = $50,000+ over time"

    - id: "bg_rumors_true_unfair_advantage"
      hook: "The rumors are true..."
      angle: "Legal unfair advantage = customer mathematics"
      broke_math:
        cac: "$100"
        revenue: "$120"
        profit: "$20"
        strategy: "Reinvest slowly, compete on price, struggle to grow"
      rich_math:
        cac: "$100"
        revenue: "$400"
        profit: "$300"
        strategy: "Reinvest aggressively, compete on value, scale rapidly"
      insight: "Rich math isn't about charging more. It's about structuring offers smarter"
      example: "Instead of one $120 offer, create a sequence: $97 + $199 + $147 + $97/month"

    - id: "bg_quick_question"
      hook: "Quick question: What's your email?"
      angle: "Solving the wrong problem - need more money per customer, not cheaper leads"
      math: "If you make $200/customer, spend $50. If competitor makes $800/customer, they can spend $300. Who wins?"

    - id: "bg_cheaper_leads"
      hook: "You don't need cheaper leads. You need a better money model."
      comparison:
        business_a: "Gets customers for $20, makes $60 each"
        business_b: "Gets customers for $50, makes $250 each"
      winner: "Business B - can spend 2.5x more on ads and still make more profit"

    - id: "bg_3x_value"
      hook: "Is it possible to 3x your customer value in 90 days?"
      contrast:
        single_transaction: "$500 per customer"
        money_model: "$1,500+ per customer"
      analogy: "Selling someone one book vs. getting them to join your library"

    - id: "bg_losing_to_profit"
      hook: "I went from losing $20 on every customer to making $240 profit from every customer."
      before: "Sell $100, spend $120 getting them, lose $20"
      after: "Sell $100 + $200 upsell + $160 follow-up + $50/month = $240 profit day one"

    - id: "bg_age_hook"
      hook: "If you're 25 to 55 and own a business that's not growing as fast as you want..."
      problem: "Working harder but nothing changes"
      shift:
        old: "I need more customers"
        new: "I need to make more money from each customer"
      analogy: "Hamster wheel vs. money machine"

    - id: "bg_woke_up"
      hook: "If I woke up with a struggling business tomorrow, and wanted to fix it by December..."
      plan:
        month_1: "Figure out what's broken - customer journey, confusion points, why they don't buy"
        month_2: "Fix the broken stuff - easier understanding, more reasons to buy, backup offers"
        month_3: "Test everything - one thing at a time, keep good, throw out bad"
      key_insight: "Think like an architect, not a firefighter"

    - id: "bg_client_results"
      hook: "One of my portfolio companies got a 7.5x increase in profit per location..."
      old_way: "Run ads, get customers, sell one thing, hope they come back, lose money"
      new_way: "Sell $97, immediately sell $300, follow up $200, get $97/month"
      result: "Instead of $97 per customer, now make $694 per customer on average"

    - id: "bg_business_model"
      hook: "Most businesses work like this: Customer buys something. Business hopes they buy again someday. The end."
      examples:
        netflix: "Free trial gets you to try, good shows keep you watching, new shows keep you paying"
        apple: "iPhone gets you in the door, apps make it useful, cases protect investment, upgrades keep you buying"
      insight: "They don't hope you come back. They design systems that make you want to come back."

    - id: "bg_two_types"
      hook: "There are two types of business owners..."
      type_1:
        question: "How do I get more customers?"
        focus: "Work IN their business"
      type_2:
        question: "How do I make more money from each customer?"
        focus: "Work ON their business"

    - id: "bg_pattern_recognition"
      hook: "I've been obsessed with one question: Why can some businesses spend unlimited money on ads?"
      pattern:
        - "Get customers cheaper than competitors"
        - "Make more money from each customer"
        - "Get customers to buy repeatedly"
        - "Reinvest profits to get more customers"
      insight: "It's like compound interest, but for businesses"

    - id: "bg_economics_theory"
      hook: "Here's a simple business problem..."
      company_a: "Spends $100, makes $120 back in 30 days"
      company_b: "Spends $100, makes $380 back in 30 days"
      why_different: "Not better products or marketing - better design"
      outcome: "Company B gets 3x more customers, dominates market, Company A goes out of business"

    - id: "bg_price_setters"
      hook: "In every market, there are two types of businesses: Price setters and price takers."
      price_setter:
        example: "Assessment $500 + Strategy $2,000 + Implementation $5,000 + Support $1,000/month"
        result: "Can spend more on marketing, offer better guarantees, provide more value upfront"

    - id: "bg_bucket_analogy"
      hook: "A lot of people ask me what's better: getting more customers or getting more money from customers you already have."
      analogy: "Getting more customers = filling bucket with holes. Getting more from current = fixing the holes first."

    - id: "bg_book_comparison"
      hook: "This book will teach you more about making money from customers than all these famous business books combined"
      books_compared:
        - "Good to Great"
        - "The Lean Startup"
        - "Built to Last"
        - "The E-Myth"
        - "Blue Ocean Strategy"
      difference: "Those books talk ABOUT business. This book shows you HOW to do business."

    - id: "bg_100k_vs_1m"
      hook: "$100K business owner: 'I need more customers.' $1M business owner: 'I need better systems.'"
      shift: "$100K owners solve problems once. $1M owners solve problems forever."

    - id: "bg_only_3_books"
      hook: "These are the only 3 books you need if you want to build a real business"
      books:
        - "$100M Offers - What to sell"
        - "$100M Leads - How to find people to buy it"
        - "$100M Money Models - How to make the most money from each person"

    - id: "bg_customer_journey"
      hook: "Does your customer journey look like this?"
      bad: "Ad -> Landing Page -> One Offer -> Cross Your Fingers"
      good: "Ad -> Value -> More Value -> Sale -> More Sales -> Happy Customer"

    - id: "bg_50_percent_more"
      hook: "Did you know that if you could get just 50% more money from each customer, you could spend 50% more to get them?"
      insight: "Not about charging more - about giving more value in smarter ways"
      example: "Instead of one $500 thing: $200 + $150 + $100 + $50/month"

    - id: "bg_small_vs_big"
      hook: "Small business vs. Big business - what's the difference?"
      small: "Make one offer, customer buys or doesn't, move on, repeat forever"
      big: "Make one offer, customer buys, make another offer, customer buys again, customer becomes a fan"

    - id: "bg_one_book_2025"
      hook: "If you could only read 1 business book in 2025, it should be this one."
      reason: "Solves the ONE problem that kills most businesses: Not making enough money from customers"

    - id: "bg_mba_comparison"
      hook: "This book will teach you more about making money in business than a $200,000 MBA."
      comparison:
        mba: "Teach you how to analyze businesses that already work"
        book: "Teach you how to build a business that works"
      metrics:
        mba_time: "2 years"
        book_time: "2 days"
        mba_cost: "$200,000"
        book_cost: "$47"

    - id: "bg_12_week_plan"
      hook: "If you want to fix one thing about your business every week for the next 12 weeks..."
      weeks:
        - "Figure out what you're actually selling"
        - "Make sure people want it"
        - "Make it easier to buy"
        - "Add something else they might want"
        - "Make saying no harder"
        - "Get them to come back"
        - "Get them to buy again"
        - "Make them tell their friends"
        - "Keep them happy"
        - "Find more people like them"
        - "Do it all faster"
        - "Do it again"

    - id: "bg_90_days_new_town"
      hook: "If I only had 90 days in a brand new town with zero connections..."
      plan:
        days_1_30: "Find the money leak in local businesses"
        days_31_60: "Fix the leak for free to prove it works"
        days_61_90: "Offer to fix same problem for competitors, charge based on results"

    - id: "bg_double_profits"
      hook: "If you're a business owner and you want to double your profits by fixing how you sell instead of getting more customers..."
      shift: "Instead of 100 customers at $200 each... What if 50 customers at $800 each?"

    - id: "bg_first_millionaire"
      hook: "Want to be the first millionaire in your family?"
      truth: "Not about working harder or being smarter. It's about information."
      system:
        - "Find people with problems"
        - "Solve their problems for money"
        - "Make more money from each person"
        - "Get them to pay you repeatedly"
        - "Reinvest profits to help more people"

    - id: "bg_90_percent_losing"
      hook: "What if I told you that 90% of businesses are losing money on every customer... but they don't know it?"
      real_math:
        cac: "$100"
        service_cost: "$50"
        revenue_if_stay: "$300 over 4 months"
        reality: "Most leave after one purchase = $120 revenue, lose $30 per customer"

    - id: "bg_1000_books"
      hook: "I have read over 1,000 books on business and this is the only one you need to read to build a million-dollar company."
      reason: "None teach the ONE thing that determines success: How to make money from customers"

    - id: "bg_smart_vs_dumb"
      hook: "Smart business owners make money from customers. Dumb business owners make money from products."
      dumb: "Sell $500 course and hope they're happy"
      smart: "Give $500 course free, offer $200/month coaching, offer $5,000 done-for-you when ready"

    - id: "bg_how_long"
      hook: "How long does it take you to go from broke business owner to millionaire?"
      slow_path: "10-20 years - one product, hope people buy, reinvest slowly, scale gradually"
      fast_path: "2-5 years - design systems, reinvest aggressively, scale exponentially"

    - id: "bg_60_seconds"
      hook: "In the next 60 seconds, I'm going to show you why 95% of businesses struggle and 5% get rich."
      struggling:
        cac: "$100"
        revenue: "$120"
        profit: "$20"
      rich:
        cac: "$100"
        revenue: "$400"
        profit: "$300"
      example:
        struggling_gym: "Customer pays $100/month, stays 3 months = $300"
        rich_gym: "Customer pays $600 challenge + $200 supplements + $100/month x 12 = $2,000"

    - id: "bg_8_years"
      hook: "It took me 8 years to learn this, but I'm going to teach you how in 90 minutes."
      lesson: "You don't make money from products. You make money from customers."
      shift:
        product_thinking: "If I can just create the perfect product, customers will come"
        customer_thinking: "If I can just understand my customers perfectly, I'll know exactly what to offer"

    - id: "bg_ltv_steps"
      hook: "Everyone tells you to 'increase customer lifetime value' but nobody actually shows you how to do it."
      steps:
        step_1: "Map your current customer journey"
        step_2: "Find the gaps"
        step_3: "Fill the gaps"
        step_4: "Connect the dots"
        step_5: "Test and improve"

    - id: "bg_product_vs_customer"
      hook: "What happens when you design your business around customers instead of products?"
      product_focused:
        questions:
          - "What can I sell?"
          - "How do I make this cheaper?"
          - "How do I get more customers?"
      customer_focused:
        questions:
          - "What do customers need?"
          - "How do I provide more value?"
          - "How do I help customers more?"

