# ==============================================================================
# SALES SCRIPTS
# ==============================================================================
sales_scripts:
  script_high_ticket:
    abertura:
      script: |
        "[Nome], vi que voce ficou ate o final da apresentacao...
        isso me diz MUITO sobre voce. Voce nao e do tipo
        que so consome conteudo, voce IMPLEMENTA, certo?"

    qualificacao:
      script: |
        "Numa escala de 1 a 10, qual seu nivel de frustracao
        com [problema especifico]?"
        -> Se menor que 7: "O que precisaria mudar pra ser 10?"
        -> Se 7 ou mais: "O que te impede de resolver HOJE?"

    transicao:
      script: |
        "Pelo que voce me contou, vejo dois caminhos:
        1) Continuar sozinho e talvez conseguir em 2 anos
        2) Pegar nosso atalho e fazer em 90 dias
        Qual faz mais sentido pra voce?"

    fechamento:
      script: |
        "Perfeito! Vou liberar seu acesso agora mesmo...
        Prefere parcelar em 12x ou a vista com desconto?"

  framework_objecoes:
    metodo: "VACA - Validar, Aprofundar, Contornar, Avancar"
    respostas:
      muito_caro: "Quanto custa NAO resolver [problema]?"
      preciso_pensar: "O que especificamente precisa avaliar?"
      nao_e_pra_mim: "Quem voce conhece que precisa disso?"
      ja_tentei: "O que foi diferente do que mostrei hoje?"

  estrutura_pitch:
    abertura:
      duracao: "15 seg"
      script: |
        "Vi que voce estava no evento sobre [topico].
        Conseguiu assistir a parte sobre [beneficio especifico]?"

    qualificacao:
      duracao: "30 seg"
      script: |
        "So para eu entender melhor...
        - Qual sua situacao atual com [problema]?
        - O que mais te chamou atencao na apresentacao?
        - Qual sua maior duvida sobre [produto]?"

    transicao:
      duracao: "15 seg"
      script: |
        "Perfeito! Baseado no que voce me disse,
        [produto] pode te ajudar especificamente com..."

    oferta:
      duracao: "45 seg"
      instrucao: "Repetir stack do evento personalizado para a dor"

    fechamento:
      duracao: "30 seg"
      script: |
        "Consigo liberar seu acesso agora mesmo.
        Voce prefere [forma de pagamento A ou B]?"

