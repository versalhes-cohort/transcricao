# =============================================================================
# CONTENT FORMULAS CROSS-PLATFORM
# =============================================================================
content_formulas:

  short_form:
    hook_patterns:
      - pattern: "Credibility + Curiosity Gap"
        template: "[Authority/$$] taught me this...and it [changed/made] my [life/$$]"

      - pattern: "Number + Benefit"
        template: "[X] [words/steps/things] to [desired outcome]"

      - pattern: "Contrarian Hook"
        template: "The TRUTH about [common belief]..."

      - pattern: "Question Hook"
        template: "Would you [provocative action] if [condition]?"

    body_structures:
      - name: "Framework Drop"
        steps:
          - "Name the framework (acronym preferred)"
          - "Quick explanation of each letter/step"
          - "One example"

      - name: "Story to Lesson"
        steps:
          - "Mini situation setup"
          - "What happened"
          - "What I learned"
          - "How you can apply"

      - name: "Objection Flip"
        steps:
          - "Common objection stated"
          - "Why people think this"
          - "Reframe with psychology"
          - "What to say instead"

  long_form:
    opening_formulas:
      - name: "Anti-Pitch Credibility"
        template: |
          "If you don't know who I am, my name is [name].
          I own [company] - we do [impressive metric].
          I have nothing to sell you.
          I make these videos because [genuine reason]."

      - name: "Audience Segmentation"
        template: |
          "Raise your hand if you're [level 1]...
          Who's doing [level 2]...
          Who's at [level 3]...
          Great, I'll try to cater this to all of you."

      - name: "Story Hook"
        template: |
          "[Time] ago I told [people] to [counterintuitive advice].
          I was partially right and partially wrong.
          In this video I'll break down [what changed]."

    framework_structures:
      - name: "Numbered Steps"
        format: "Step 1, Step 2, Step 3... with stories for each"

      - name: "Acronym Framework"
        format: "CLOSER, LEADS, etc - each letter = concept + example"

      - name: "Phase Progression"
        format: "Phase 1 to Phase 5 with 'where most stop' insight"

      - name: "Belief/Lesson List"
        format: "9 beliefs, 10 lessons, 8 things... with stories"

  twitter_specific:
    one_liner_formulas:
      - pattern: "[Noun] is [surprising definition]"
        example: "Hard work is the ability to endure discomfort for extended periods"

      - pattern: "[Common belief]. [Contrarian truth]."
        example: "People try to explain why others do things and yet don't know why they do things themselves."

      - pattern: "The [superlative] [people] [action] because [insight]"
        example: "The best salesmen care deeply for the customer and little for getting the deal"

    thread_formulas:
      - pattern: "Hook + Numbered List + Reframe"
      - pattern: "Question + Steps + Call to action"
      - pattern: "Myth vs Reality breakdown"

