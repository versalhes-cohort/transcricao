# =============================================================================
# BIGGEST FAILURES (AND HOW MUCH THEY COST)
# =============================================================================
failures:
  - name: "Quibi"
    loss: "$1.75B"
    problem: "Name explained format, not benefit"
    lesson: "Feature name ≠ benefit name"

  - name: "Google Glass"
    loss: "$1B+"
    problem: "Too technical, 'Glass' = voyeurism connotation"
    lesson: "Consider negative connotations"

  - name: "New Coke"
    loss: "$4M direct, billions in brand damage"
    problem: "'New' invalidated heritage"
    lesson: "Never invalidate what works"

  - name: "Microsoft Zune"
    loss: "$289M"
    problem: "Meaningless sound, communicated nothing vs iPod"
    lesson: "Empty name vs descriptive name"

  - name: "CNN+"
    loss: "$300M in 3 weeks"
    problem: "'Plus' fatigue, no clear value"
    lesson: "Copied model ≠ success"

# =============================================================================
# THE 20-QUESTION BILLION TEST
# =============================================================================
billion_test:
  basic:
    - "Passes 'drunk test'? (easy to say/spell?)"
    - "Available as .com for <$10K?"
    - "Trademark free globally?"
    - "Works in 3+ languages?"
    - "Social media @exact available?"

  strategic:
    - "Communicates category OR creates new one?"
    - "Allows product expansion?"
    - "Different from everything on Google page 1?"
    - "Possible to become cultural verb?"
    - "Pleasant sound when spoken?"

  psychological:
    - "Evokes instant emotion?"
    - "Suggests desired transformation?"
    - "Reduces purchase anxiety?"
    - "Creates immediate curiosity?"
    - "Memorable after 1 mention?"

  commercial:
    - "Allows premium pricing?"
    - "Works on billboard/audio?"
    - "Viral hashtag potential?"
    - "Interesting origin story?"
    - "Desire scale 1-10: 8+?"

  scoring:
    20_of_20: "Potential unicorn"
    15_to_19: "Launch and optimize"
    10_to_14: "Needs refinement"
    under_10: "Back to brainstorm"

# =============================================================================
# THE 7 IMMUTABLE LAWS OF MILLION-DOLLAR NAMES
# =============================================================================
immutable_laws:
  - law: "SIMPLICITY > CREATIVITY"
    explanation: "Simple names dominate because human brain is lazy"
    example: "Google > BackRub, Apple > Apple Computer Inc."

  - law: "BENEFIT > FEATURE"
    explanation: "What you get, not what it does"
    example: "Dollar Shave Club (benefit) > Razor Subscription Service (feature)"

  - law: "EMOTION > LOGIC"
    explanation: "People buy feelings"
    example: "Nike (victory) > Athletic Shoe Company"

  - law: "SPECIFIC > GENERIC"
    explanation: "Details create credibility"
    example: "P90X > 'Fitness Program', 75 Hard > 'Challenge'"

  - law: "SHORT > LONG"
    explanation: "Average unicorn: 7.3 characters"
    example: "Uber > Underground Passenger Enhancement Route"

  - law: "STORY > DESCRIPTION"
    explanation: "Narrative beats explanation"
    example: "Warby Parker (literary characters) > Affordable Eyewear Direct"

  - law: "TIMING > PERFECTION"
    explanation: "80% good name launched today > 100% perfect never launched"
    example: "Execute now, refine later"

