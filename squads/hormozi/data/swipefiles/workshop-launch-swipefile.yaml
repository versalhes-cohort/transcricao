# =============================================================================
# WORKSHOP FRAMEWORK
# =============================================================================
workshop:
  framework_7_blocos:
    bloco_1_hook_impossivel:
      duracao: "10 min"
      elementos:
        - "Promessa especifica e mensuravel"
        - "Elemento de prova ao vivo"
        - "Stakes estabelecidos"
      script_abertura: |
        "Nos proximos [TEMPO], vou mostrar exatamente como [RESULTADO ESPECIFICO]
        sem [OBJECAO 1], sem [OBJECAO 2], mesmo que [LIMITACAO COMUM].

        E vou provar isso ao vivo, na sua frente, fazendo [DEMONSTRACAO].

        Se ao final voce nao tiver pelo menos [PEQUENO RESULTADO GARANTIDO],
        eu [PENALIDADE PARA VOCE]."

    bloco_2_origem_conexao:
      duracao: "15 min"
      elementos:
        - "Ponto de partida pior que a audiencia"
        - "Momento de descoberta"
        - "Primeira transformacao"

    bloco_3_educacao_profunda:
      duracao: "60 min"
      elementos:
        - "Framework proprietario"
        - "3 insights contra-intuitivos"
        - "Demonstracao pratica"

    bloco_4_casos_cascata:
      duracao: "30 min"
      elementos:
        - "Caso pessoal detalhado"
        - "3-5 casos de clientes"
        - "Caso ao vivo se possivel"

    bloco_5_stack_valor:
      duracao: "20 min"
      elementos:
        - "Ancora alta com reducoes"
        - "Minimo 5 componentes"
        - "Comparacoes externas"
      script_reducao_preco: |
        "O valor normal disso seria [ANCORA ALTA] porque [JUSTIFICATIVA].

        Mas nao vou cobrar [ANCORA].
        Nem mesmo [50% DA ANCORA].
        Nem [25% DA ANCORA].

        Hoje, apenas para quem esta ao vivo, o investimento e [PRECO FINAL].

        Mas tem um detalhe..."
        [REVELAR CONDICAO OU BONUS SURPRESA]

    bloco_6_inversao_risco:
      duracao: "10 min"
      elementos:
        - "Garantia expandida"
        - "Bonus de acao rapida"
        - "Penalidade por nao agir"
      formula_garantia: "Garantia = Resultado Prometido + Prazo + Condicao + Consequencia"
      exemplo: |
        "Se em 90 dias voce nao tiver [RESULTADO],
        mesmo aplicando [CONDICAO MINIMA],
        eu [CONSEQUENCIA FAVORAVEL AO CLIENTE]"

    bloco_7_demonstracao_final:
      duracao: "30 min"
      elementos:
        - "Q&A ao vivo"
        - "Consultoria demonstrativa"
        - "Urgencia real criada"

  framework_10_fases_hormozi:
    fase_1:
      nome: "Gancho de Abertura e Prova Social"
      duracao: "10-15 min"
      elementos:
        - "Promessa de quebrar recordes mundiais"
        - "Introducao com juiza do Guinness Book"
        - "Estabelecimento de stakes elevados"
      citacao: "I'm Alex Ramosi, and welcome to my $100 million Money Models book launch event. And we're going to try and break not one, but two world records together here live"

    fase_2:
      nome: "Disclaimer e Frame Setting"
      duracao: "5 min"
      objetivo: "Protecao legal + aumentar credibilidade atraves de transparencia"
      citacao: "But I want to warn you, this isn't a promise to become rich... Everyone is different"

    fase_3:
      nome: "Historia de Origem e Credibilidade"
      duracao: "15-20 min"
      elementos:
        - "Trajetoria pessoal do zero aos $250M"
        - "Demonstracao de resultados especificos"
        - "Conexao emocional com a audiencia"
      citacao: "I sold three companies I started as a kid, two of them at $46.2 million in an all-cash deal"

    fase_4:
      nome: "Conteudo Educacional Core"
      duracao: "60-90 min"
      elementos:
        - "Conceito de Money Models"
        - "Os 4 mecanismos principais"
        - "Demonstracao com casos reais"
      formula: "30-day gross profit is greater than two times cost of acquiring a customer plus cost of goods sold"
      mecanismos:
        - nome: "Attraction offers"
          funcao: "get people to buy"
        - nome: "Upsell offers"
          funcao: "get them to spend more"
        - nome: "Downsell offers"
          funcao: "get them to buy something if they say no"
        - nome: "Continuity offers"
          funcao: "get them to buy repeatedly"

    fase_5:
      nome: "Casos de Estudo Sequenciais"
      duracao: "45-60 min"
      casos:
        - nome: "Gym Launch"
          resultado: "$380,000 to $1.76 million in six months"
        - nome: "Prestige Labs"
          resultado: "$270,000 a month to 1.6 million a month in two months"
        - nome: "ALLEN"
          resultado: "$50,000 to $1.3M/month in six months"
        - nome: "School"
          resultado: "1M to 15M+ users in 18 months"

    fase_6:
      nome: "Stack de Ofertas"
      duracao: "30-45 min"
      estrutura_stack:
        - item: "Lead System"
          valor: "$15,999"
        - item: "Sales System"
          valor: "$5,999"
        - item: "Delivery System"
          valor: "$6,499"
        - item: "Profit System"
          valor: "$41,458"
      total_valor: "$69,955"
      reducao_sequencial:
        - "$69,955"
        - "$29,997"
        - "$9,997"
        - "$5,997"
      plot_twist: "three interest-free payments of zero dollars. Yes, it's 100% free"

    fase_7:
      nome: "Decisoes e Frameworks"
      duracao: "20-30 min"
      elementos:
        - "10 decisoes que mudaram sua vida"
        - "Criacao de urgencia psicologica"
      citacao: "If I put my last $1,000 in the S&P 500 in 2016... I'd have $2,400 today. But instead, I invested my last $1,000 in skills..."

    fase_8:
      nome: "Reveal do Recorde Mundial"
      duracao: "5-10 min"
      elementos:
        - "Confirmacao ao vivo do recorde"
        - "Celebracao coletiva"

    fase_9:
      nome: "Premios e Social Proof"
      duracao: "15-20 min"
      elementos:
        - "Sorteio de premios"
        - "Demonstracao de comunidade"

    fase_10:
      nome: "Hotline ao Vivo"
      duracao: "2+ horas"
      elementos:
        - "Consultoria ao vivo"
        - "Demonstracao de expertise"
        - "Criacao de FOMO"

  scripts:
    transicao_educacao_oferta: |
      "Voce viu como [RECAPITULAR INSIGHT PRINCIPAL].

      Agora voce tem duas opcoes:
      Opcao 1: Pegar tudo que mostrei e tentar implementar sozinho.
      Vai funcionar? Talvez. Em quanto tempo? Nao sei.

      Opcao 2: Deixar eu instalar isso para voce, junto com
      [BENEFICIO EXTRA NAO MENCIONADO ANTES].

      Deixe-me mostrar exatamente o que voce recebe..."

    transicao_bloco_1_2: "Agora que voce viu o que e possivel, deixe-me mostrar o que esta impedindo 99% das pessoas..."
    transicao_bloco_2_3: "Mas existe uma saida. E ela e mais simples do que voce imagina..."
    transicao_bloco_3_4: "Conhecimento sem acao e apenas entretenimento. Veja como implementar..."
    transicao_bloco_4_5: "Voce tem duas opcoes: fazer sozinho ou deixar que eu facilite o caminho..."
    transicao_bloco_5_6: "A decisao e sua, mas o tempo nao espera..."

    script_high_ticket: |
      ABERTURA QUE QUEBRA PADRAO:
      "Joao, vi que voce ficou ate o final da apresentacao...
      isso me diz MUITO sobre voce. Voce nao e do tipo
      que so consome conteudo, voce IMPLEMENTA, certo?"

      QUALIFICACAO PROFUNDA:
      "Numa escala de 1 a 10, qual seu nivel de frustracao
      com [problema especifico]?"
      - Se menor que 7: "O que precisaria mudar pra ser 10?"
      - Se 7 ou mais: "O que te impede de resolver HOJE?"

      TRANSICAO NATURAL:
      "Pelo que voce me contou, vejo dois caminhos:
      1) Continuar sozinho e talvez conseguir em 2 anos
      2) Pegar nosso atalho e fazer em 90 dias
      Qual faz mais sentido pra voce?"

      FECHAMENTO:
      "Perfeito! Vou liberar seu acesso agora mesmo...
      Prefere parcelar em 12x ou a vista com desconto?"

