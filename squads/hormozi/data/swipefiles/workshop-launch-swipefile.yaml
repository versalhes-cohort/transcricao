    acronimo: "E.V.E.N.T.O"
    significado:
      E: "ESCASSEZ ARTIFICIAL - Crie um momento unico e irrepetivel no tempo"
      V: "VALOR EMPILHADO - Stack de ofertas que supera o preco em 10X"
      E2: "ESCADA DE COMPROMISSO - Micro-compromissos ate a grande conversao"
      N: "NETWORK EFFECT - Transforme clientes em promotores instantaneos"
      T: "TENSAO NARRATIVA - Historia com inicio, meio e climax emocional"
      O: "OFERTA IRRECUSAVEL - Inversao de risco + garantias impossiveis"

  8_fases:
    fase_1:
      nome: "PREPARACAO"
      timing: "6 semanas antes"
      duracao: "2-3 semanas"
      objetivo: "Construir toda infraestrutura e ativos"
      acoes:
        - "Produzir 1000+ variacoes de ads + 2 hero ads"
        - "Construir 7 paginas de funil no Shopify"
        - "Configurar infraestrutura (LED Wall, estudio virtual)"
        - "Preparar sequencias de 30+ emails"
        - "Load testing para 1M+ acessos simultaneos"
      recursos: "10+ pessoas dedicadas, $500K em setup"

    fase_2:
      nome: "KICKOFF AFILIADOS"
      timing: "6 semanas antes"
      duracao: "Continua ate o lancamento"
      objetivo: "Ativar exercito de promotores com gamificacao"
      sistema_incentivos:
        top_10:
          requisito: "Mais sign-ups que aparecem"
          premio: "Jantar privado + Fireside chat + Workshop presencial"
        top_50:
          requisito: "Top 50 por sign-ups"
          premio: "Workshop presencial + Q&A grupo"
        10_plus_signups:
