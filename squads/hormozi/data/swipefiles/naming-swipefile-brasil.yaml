  - archetype: "O SIMPLIFICADOR RADICAL (The Radical Simplifier)"
    examples: ["Nubank", "PicPay", "99"]
    works_when: "Category is complex/bureaucratic"
    psychology: "Brazilian hates complication"
    icp: "People traumatized by old system"
    result: "Fast dominance"

  - archetype: "O ASPIRACIONAL INTERNACIONAL (The International Aspirational)"
    examples: ["Arezzo", "Kopenhagen", "Stone"]
    works_when: "Want to charge premium"
    psychology: "Brazilian values 'gringo'"
    icp: "Classes B/C wanting to seem A"
    risk: "Can seem snobbish"

  - archetype: "O EXPLICATIVO LITERAL (The Literal Explainer)"
    examples: ["PagSeguro", "Dr. Consulta", "Descomplica"]
    works_when: "Concept is new"
    psychology: "Removes understanding barrier"
    icp: "Technically non-educated masses"
    benefit: "Educates while selling"

  - archetype: "O PERSONIFICADO AMIGO (The Personified Friend)"
    examples: ["Zé Delivery", "James", "Magazine Luiza"]
    works_when: "Want to create relationship"
    psychology: "Brazilian buys from who they trust"
    icp: "People wanting humanized service"
    strength: "Natural loyalty"

  - archetype: "A PROMESSA DEFINITIVA (The Definitive Promise)"
    examples: ["Emagrecer de Vez", "Definitivo", "Sem Volta"]
    works_when: "Market has many weak solutions"
    psychology: "Brazilian tired of trying"
    icp: "People with multiple frustrations"
    conversion: "Very high in launches"

  - archetype: "O NÚMERO MÁGICO (The Magic Number)"
    examples: ["99", "Desafio 19 Dias", "P90X Brasil"]
    works_when: "Time/quantity is differentiator"
    psychology: "Specific seems scientific"
    icp: "People wanting predictability"
    hack: "Broken numbers convert more in Brazil"

