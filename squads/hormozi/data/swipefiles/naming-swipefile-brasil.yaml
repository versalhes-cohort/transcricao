  fintech:
    patterns:
      - "[Action] + Seguro"
      - "[Color] + [Tech Word]"
      - "Banco [Adjective]"
    psychology: "Trust is everything"

  ecommerce:
    patterns:
      - "[Category] + [Channel]"
      - "Mercado [Adjective]"
