# THE 7 ARCHETYPES OF WINNING NAMES IN BRAZIL
# =============================================================================
archetypes_brazil:
  - archetype: "O BRASILEIRO RAIZ (The Root Brazilian)"
    examples: ["Havaianas", "Riachuelo", "QuintoAndar"]
    works_when: "Want to create deep cultural connection"
    psychology: "Brazilian likes to see themselves"
    icp: "Masses wanting belonging"
