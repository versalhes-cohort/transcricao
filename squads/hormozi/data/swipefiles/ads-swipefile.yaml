# =============================================================================
# PATTERN ANALYSIS
# =============================================================================
patterns:
  retargeting_patterns:
    - pattern: "Soft opener + value recap + cart reminder"
    - pattern: "Proof elements always included (numbers, results)"
    - pattern: "Multiple hooks per ad"
    - pattern: "No hard sell - reminder tone"
    - pattern: "Specific numbers over vague claims"

  launch_patterns:
    - pattern: "Extreme urgency with specific deadline"
    - pattern: "Price anchoring with itemized value"
    - pattern: "90 days framing as 'enough time'"
    - pattern: "Lifetime pricing creates FOMO"
    - pattern: "Stats-based social proof"
    - pattern: "Empathy elements (I've been broke)"

  hook_inventory:
    soft_hooks:
      - "Quick reminder"
      - "Just so you remember"
      - "Worth remembering"
      - "In case you forgot"
      - "Simple reminder"
    value_hooks:
      - "The real value"
      - "What you get"
      - "Your benefits"
      - "$X worth"
    urgency_hooks:
      - "One-time launch only"
      - "This Saturday only"
      - "Never again"
      - "Gone forever"

